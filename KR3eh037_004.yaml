body:
  text: 卷四癆瘵第四脈法癆瘵脈酉戌時洪盛寅卯時細弱者陽氣虛陷也忌服苦寒損其陽氣當以助陽之劑復其寅卯之位微加瀉陰火而已若服寒涼證雖大減脈反加數者陽郁也朝暮異脈而朝細暮洪者振陽分之陽滋陰分之陰朝洪暮細者斂陽分之陰溫陰分之陽右脈大用保元湯左脈大用六味湯不減若燥者以栝蔞生甘草散潤之久病咳嗽氣喘若脈洪數不可即用補藥如服之虛火一退多令人痿倦不起以上下文意測之補藥二字當作瀉火此證本不宜瀉火肺體已痿一瀉不返治法不外宣陽納陰陽郁由於濕痹陰浮由於血虛及燥熱宜以龜板牡蠣清滋又有下寒上衝而然者是實邪也以法逐之化之須先用獨參湯以接其氣數日後數脈漸退方與調理為是總論夫癆者勞也非一端可盡或若心竭其心脾之神志或酒色竭其肝腎之陰精或久痢久瘧傷寒傷暑諸證治之不當損其氣血傷其脾胃五臟乾枯而火起以致發熱則金受克大腸先結燥而水之源先涸矣宜見脈見症用藥果當無不愈者若初熱未甚繼以治法之非久之即成蒸病蒸病者如甑之蒸熱之極也然使初病元氣尚強脈氣尚旺照古方用五蒸湯加減二十三蒸之法亦無不驗治蒸法服之病稍退又當察症清心參用癆病治方不可造次蒸或病十日半月熱極致骨中血凝便化為蟲張仲景立祛血之法不使凝血化蟲䗪蟲丸百勞丸是也倘治之不得其序不能祛血血化為蟲是時病人脈氣尚充精神尚充猶可救也如聲啞喉痛寒熱大作脈細而數不思飲食精神視聽俱不能支皆屬不治又有火鬱痰凝氣滯咳嗽發熱氣喘葛先生保和湯保真湯次序用之火散痰開熱退總歸八珍湯調理又有吐紅咳嗽脈雖數有神不致於蒸極作蟲者脈洪脈數虛虛實實通變在乎心靈矣骨蒸由氣虛不能化血血乾則火自沸騰內如針刺骨熱煩疼或五心俱熱或兩肋如火或子午相應或晝微惡寒而夜反大熱雖腎經所主傳變不常蒸上則喘咳痰血舌黑耳鳴目眩等症蒸下則見夢遺淋濁泄瀉腰疼腳疼等症蒸中則見腹脹脅痛四肢倦怠等症不問陰病陽病日久皆能傳變男子自腎傳心肺肝脾女子自心傳肺肝脾腎五臟復傳六腑而死矣有始終只傳一經者有專著心腎而不傳者大要以脈為證驗凡氣血勞倦不運則凝滯疏漏邪氣得以相乘又飲食勞倦所傷則上焦不行下脘不通熱極蒸胸中而內熱生矣凡頸上有核腸中有塊或當臍冰冷或無力言動皆痰涎結聚氣血凝滯之所致故以開關啓胃為先蓋關脈閉則氣血乾竭胃氣弱則藥無由行但陽虛不可偏用辛香丁附之類陰虛不可用苦寒古方有開關定胃散今亦難用竊其意推之蟲為氣血凝滯瘀血化成但平補氣血為主加以烏梅青蒿硃砂之類而蟲自亡矣紫河車丹紫河車丸青蒿膏蛤蚧散選用惟度其虛實為主凡體虛者宜先用補法補其元氣然後用王道之藥佐之以殺蟲之劑如化蟲丸使君子丸之類或追蟲後而繼以溫補亦可不然則蟲去而元氣亦散傳尸之說不必深泥歷觀癆瘵皆因酒色之類損傷心血以致虛火妄動醫者不分陰陽用藥病者不思疾由自取往往歸咎前因甚者疑及房室器皿墳墓及冤業飛尸遞相傳疰古人云癆瘵三十六種惟陰德可以斷之不幸患此疾者或入山林或居靜室清心戒欲專意保養庶乎病可除根不然即服藥不效癆蟲須分五臟常居肺間正所謂膏之上肓之下針之不得藥之不行只宜早灸膏肓四花為佳若蝕肺系則咯血吐痰聲嘶思食無厭病恚至此未易療治當參究古法九蟲及一十八種蟲名之異並紫庭取蟲諸法晝熱行陰二十五度大抵柴胡飲子夜熱行陰二十五度四順飲子平旦發熱熱在行陽之分肺氣主之故用白虎湯以瀉氣中之火日晡潮熱熱在行陰之分腎氣主之故用地骨皮散以瀉血中之火肝症發熱肉下骨上寅卯尤甚瀉青丸人中白散心症發熱在血脈日中則甚單瀉心湯導赤散硃砂安神丸脾症發熱在肌肉遇夜尤甚瀉黃散三白湯肺症發熱在皮毛日西則甚瀉白散甚者涼膈散腎證發熱在骨亥子尤甚兩手足心如火滋腎丸尸注一症豫嘗治之先癸亥夜二更六神皆聚之時灸腰眼穴七壯然後用藥倘不能待先用藥亦可注病亦似勞症但兩足無力行則痿疲是也其治法六脈洪數八物湯脾肺不足補中益氣湯睡不穩歸脾湯不思食六君子湯隨症推類但煎劑中須加忍冬葉三錢同煎本草以其葉能治尸注也凡治勞症或男或婦若淫火不退者雖治不治骨蒸勞夫骨蒸勞者由於積熱附於骨而名也亦曰傳尸殗殜復連無辜其名不一此病皆由肺胃虧損所致其形羸瘦泄痢肢體無力傳於腎則盜汗不止腰膝痛夢鬼交侵小便赤黃傳於心則心神怯悸喜怒不時頰唇赤色乍熱乍寒傳於肺則胸滿短氣咳嗽吐痰皮膚甲錯傳於肝則兩目昏暗脅下妨痛閉戶忿怒五臟既病則難治療立齊云前症多因經行胎産或飲食七情而傷脾胃之所致又或病後失於調攝而成也東垣云發熱之症肺熱者輕手乃得微按全無日西尤甚其證咳嗽寒熱輕者用瀉白散重者涼膈散白虎湯地骨皮散心熱者微按之皮膚之下肌肉之上在血脈也日中大甚其症心煩心痛掌中熱而噦用黃連瀉心湯導赤散硃砂安神丸脾熱者輕手捫之不熱重手按至筋骨又不熱不輕不重在輕重之間在肌肉也遇夜尤甚其症怠惰嗜臥四肢不收無氣以動用瀉黃散肝熱者按之肌肉之下至骨之上寅卯時為甚其症四肢滿悶便難轉筋多怒多驚筋痿不能起於床用瀉青柴胡湯飲腎熱者按至骨分甚熱蒸手其症骨酥如蟲蝕困熱不能起於床用滋陰丸此治實熱之法也蒸無實熱即鬱極化實亦宜宣清滋化並用諸方未可專恃薛立齊云肺經虛熱者用人參補肺湯脾虛不能生肺者用六君子湯脾熱移於肺者用三黃丸心經虛熱者用補心湯命門火衰不能生土者用八味丸肝虛不能生心者用補肝散腎克心者用附子理中湯脾經虛熱者用人參黃耆散土剋水者用承氣湯腎虛不能培肝者俱用六味丸血風勞風言燥也血虛氣無所維陰虛陽無所附化為燥火走注於經脈之間上下無常忽寒忽熱刺痛昏厥而成風象血風勞症因氣血素虛或産後勞傷外邪所乘或內有宿冷以致腹中疼痛四肢酸倦發熱自汗及婦人月水不調面黃肌瘦當調肝脾氣血為主東垣云喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故因熱懶言動作喘乏表熱自汗心煩不安當病之時宜安靜存養以甘寒瀉其熱氣以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之要略云平人脈大為勞以黃耆建中湯治之冷勞此血虛而痰水漬於筋骨之間也痰盛則冷亦有寒濕所傷者血虛甚即見拘攣轉筋冷勞者氣血不足臟腑虛寒以致臍下疼痛手足時寒婦人月水失常飲食不消或時嘔吐惡寒發熱骨節痠疼肌膚羸瘦面色萎黃也立齊曰前證有內外真寒有內外真熱亦有內真熱而外假寒有內真寒而外假熱若飲食難化大便不實腸鳴腰痛飲食畏寒手足逆冷面黃嘔吐惡見風寒此內外真寒之症也宜用附子理中湯以回陽八味地黃丸以壯火若飲食如常大便堅實胸腹痞脹飲食喜冷手足煩熱面赤嘔吐不畏風寒此內外真熱之症也宜用黃連解毒湯以滋陰六味丸以壯水若飲食如常大便堅實胸腹痞脹而飲食喜寒手足逆冷面黃嘔吐畏見風寒此內真熱而外假寒也亦用解毒湯六味丸而宜於熱服若飲食少思大便不實吞酸噯氣而手足煩熱面赤嘔吐不畏風寒此內真寒而外虛熱也亦用附子理中及八味丸而不妨溫飲經曰益火之原以消陰翳壯水之主以制陽光使不知真水火之不足泛以寒熱藥投之則舊病不去新病復生矣火之原者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心原為肝水為腎主為肺也或者亦以命門為火原未為非是故用八味丸以益命門耳熱勞此津液不足而血滯於經脈之間也血盛則熱亦有風暑內灼者其證兼見昏厥熱勞由心肺壅熱傷於氣血以致心神煩躁頰赤頭疼眼澀唇乾口舌生瘡神思困倦四肢壯熱飲食無味肢體痠痛怔忡盜汗肌膚作疼或寒熱往來當審其所因調補氣血其症自減立齊云前症乃壯火食氣煎熬真陰所致也王太僕云如大寒而甚熱之不熱是無火也當治其心大熱而甚寒之不寒是無水也當助其腎心盛則生熱腎盛則生寒然心虛則熱收於內腎虛則虛寒動於中竊謂前症若肝脾血虛四物參術肝脾鬱熱小柴胡合四物脾胃氣虛補中益氣湯肝經血虛加味逍遙散肝經風熱小柴胡湯心經血虛加味四物湯午前熱屬氣分清心蓮子飲午後熱屬血分四物參朮丹皮熱從左邊起肝火也實則四物龍膽山梔虛則四物參朮黃耆熱從臍下起陰火也四物參朮酒拌炒黑黃柏知母五味麥冬肉桂如不應急用加減八味丸不時面熱或無定處或從腳心起此無根虛火也用加減八味丸及十全大補加麥冬五味子主之以上多出自立齊婦人良方帙中但男女五臟相同間有少異其為勞則一也癆瘵各疰論夫骨蒸殗殜半臥半起之謂復連內傳五臟之謂尸注勞注蟲注熱注冷注食注鬼注疰者注也自上注下與前人相似故曰注注疰皆蛀也如蟲之蛀即谷飛為蟲之義也注易之說本於巢氏似為協言其變有二十二種或三十六種或九十八種令人沉沉默默寒熱盜汗夢與鬼交遺泄白濁或腹中有塊或腦後兩邊有結核咳嗽膿血下痢羸瘦死而傳注甚至滅門更有飛尸遁尸寒尸喪尸尸疰謂之五尸人為其疰者不自知所苦雖有貍骨獺肝天靈蓋等方未嘗效也惟崔氏灸法早用有濟若寒熱自汗面白目干口苦神昏善恐不能獨臥傳在肝也若寒熱面黑鼻燥善忘大便祕瀉口舌生瘡傳在心也若寒熱面青唇黃舌本硬強言語不出飲食無味羸瘦吐涎傳在脾也若寒熱面赤鼻白乾燥毛折咯嗽喘急吐涎膿血傳在肺也若寒熱面黃耳焦腳胻痠痛小便白濁遺瀝腹痛傳在腎也以上陳臨川先生未有治法立齊云前證誠然有之故葛仙翁用獺肝一具陰乾杵末水下方寸匕日三服未愈再服宋宣和間一法師善考訊鬼怪時一婦以疾投狀既而如有鬼祟所附曰非我為患乃病人命自衰耳渠今已成蟲食肺故令吐血聲嘶又屢訊彼所畏何物云以獺爪為末酒服之則去矣患家如其言則愈獺爪即獺肝之類與元珠云蟲瘵多有互相傳染甚至絶戶此乃冤業相纏及風水所致雖有符文法水下蟲之方蟲去而人亦亡但能平素保養或可希免救生微旨云益氣補肺益精補腎皆資其化源也蓋人之精血常不足加之數奪其精資化失常則胃氣不固精氣滑脫不能上接陽氣故頭重或氣弱食少元氣下陷脈微外散欲絶而虛洪或見損脈總屬元氣不足非有外感賊邪之證也立齊嘗治一婦素勤苦因喪子肺病飲食少思脾病忽吐血甚多心病而自止此後每勞則吐數口瘵症已具形體甚倦午前以補中益氣湯滋其脾肺午後以歸脾湯養其心脾送地黃丸滋腎而愈肺病脾病心病六字原注又一女子患前症反其唇視有白點此蟲蝕肺也余曰急尋獺肝治之不相信果咯膿而歿反聞其兄弟三人皆夭於此症大凡久嗽當視其兩唇若上唇有點蟲蝕上部下唇有點蟲蝕下部尸厥夫飛尸者遊走皮膚穿行臟腑每發刺痛變作無常遁尸者附骨入肉攻通血脈見尸喪聞哀哭便發風尸者淫濯四肢痛而昏沉遇風雪便發沉尸者纏骨結臟內腫心脅發則絞痛遇寒冷便發注尸者舉身沉重精神錯雜時覺昏憒每至節氣便發以上並宜蘇合香丸治之按丹溪云凡人手足逆冷膚栗頭面青黑精神恍惚或錯言妄語或牙關緊急或昏寐倒僕吊死問喪入廟登墓多有此病先以蘇合香丸灌之次服調氣平胃散玉機微義云卒厥飛尸客忤鬼擊口噤用麻黃湯寒厥表熱裡寒則下利清穀食下則吐脈沉手足冷用四逆湯熱厥腹滿身重難轉面垢譫語遺尿手足冷自汗脈沉滑用白虎湯若人身忽然不動目閉口噤惡聲聞響眩冒頃時方寤此由出汗過多氣並於血陽獨上而不下氣壅塞而不行耳氣過血還陰陽復通移時方寤名曰鬱冒亦名血厥宜白薇湯倉公散人病尸厥呼之不應者死脈當大反小者死錦衣楊永興舉家避眚有僕沉醉失避者既而神思昏昧遍身青傷煎金銀藤湯灌之即愈一婦人忽昏憒發譫語兩腳踝膝臀處皆青腫痛不可忍口稱苦楚次日方蘇痛尚不止用金銀藤兩許水煎服愈一婦人入古冢患前症以紫金錠灌之即愈勞病主治湯方門人參養榮湯治男子血虛有汗潮熱以下諸方皆甘溫加辛散有略佐苦降酸斂者有汗潮熱無汗潮熱皆以氣血不能相維腠理膜絡痿緩弛縱開合升降失其常度也治法以補血強筋為主行氣行血佐之強筋即補氣固氣兼到而又無壅滿之虞桂附參耆桓多流弊人參白朮茯苓甘草川歸黃耆肉桂陳皮遠志熟地五味子薑水煎補中益氣湯治氣虛有汗潮熱見虛損門茯苓補心湯治血虛無汗潮熱人參茯苓陳皮桔梗枳殼前胡川芎地黃川歸白芍甘草半夏紫蘇乾葛薑棗水煎人參清肌散治氣虛無汗潮熱人參白朮茯苓赤芍當歸柴胡葛根甘草半夏曲薑棗水煎八物湯治女子血虛有汗潮熱見損虛門人參柴胡散治氣虛無汗潮熱白朮葛根半夏柴胡白茯苓人參赤芍當歸甘草薑棗水煎逍遙散治氣血兩虛無汗潮熱白朮茯苓甘草白芍歸身柴胡薑棗水煎人參五味子散治咳嗽咯血咳嗽由於陽明衝任上虛血不溫養咯血由於絡血為邪氣吸攝不能勻布內經所謂真邪相攻亂而相引也人參五味子桑白皮白朮黃耆白茯苓地骨皮熟地柴胡歸身前胡陳皮甘草枳殼桔梗渴加烏梅半個熱加青蒿知母葛氏保和湯治吐血後咳嗽此係任脈上虛肺失溫養方中多用清肺未合知母貝母天冬麥冬款冬花天花粉苡仁杏仁五味子甘草兜鈴紫菀百合桔梗阿膠當歸生地紫蘇薄荷姜煎入飴糖一匙日三服血盛加蒲黃茜根藕節大薊小薊茅花痰加南星半夏橘紅茯苓枳殼枳實栝蔞仁喘盛加桑白皮陳皮大腹皮萊蔔子葶藶子蘇子熱盛加山梔黃連黃柏連翹風盛加防風荊芥穗金沸草甘菊細辛香附寒盛加人參芍藥桂枝五味子白蠟五蒸湯治骨蒸人參黃芩知母地黃葛根煅石膏粳米麥冬甘草浮小麥一撮水煎二十四種蒸病用藥法以下方法俱從五蒸湯見症加減所謂勞蒸者毛折發焦肌膚甲錯其蒸在皮又症舌白唾血加石膏桑白皮外熱內寒身振肉瞤其蒸在肉又症食無味而嘔煩躁不安加芍藥發焦鼻衄或復尿血其蒸在血加生地當歸童子小便身熱煩躁痛如針刺其蒸在脈又症唾白浪語脈絡亂緩急不調加生地當歸童便痛如針刺血滯而散不能融活故也爪甲焦枯眼黑脅痛其蒸在髓又症髓沸骨中熱加天門冬當歸生地頭眩熱悶涎濁眵淚其蒸在腦加生地防風男子失精女子白淫其蒸在玉房加知母黃柏當歸芍藥乍寒乍熱中脘煩悶其蒸在三焦加竹葉石膏小便赤黃凝濁如膠其蒸在膀胱又症右耳焦加澤瀉滑石大便祕泄腹中雷鳴其蒸在小腹又症下唇焦加赤茯苓木通生地大腹陰痛口舌乾疼其蒸在大腸又症右鼻孔干痛加大黃芒硝口鼻乾燥腹脹自汗睡臥不安其蒸在胃又症舌下痛加石膏粳米大黃芒硝乾葛口苦耳聾兩脅下痛其蒸在膽又症眼色白加柴胡栝蔞裡急後重肛門閉澀其蒸在廣腸加缺小腹㽲痛筋脈縱緩陰器自強其蒸在宗筋加缺眩暈下淚躁怒不常其蒸在肝又症眼黑加川芎當歸前胡舌黑氣短煩悶灑淅其蒸在心又症舌乾加黃連生地當歸唇乾口瘡胸腹脹滿畏寒不食其蒸在脾加芍藥木瓜苦參咳嗽喘滿咯痰吐血聲嘶音啞其蒸在肺又症鼻乾加天冬桔梗紫菀烏梅肉耳輪焦枯腳氣痠痛其蒸在腎加生薑石膏知母寒水石藁本情想不寧精物時下其蒸在右腎加缺心膈噎塞攻擊疼痛俯仰煩冤其蒸在膈加缺上氣喘促鼻乾身熱不安其蒸在氣加人參黃芩梔子以上共二十三種加減系立齊先生引醫林集胞蒸小便赤用澤瀉茯苓生地沉香滑石膀胱蒸右耳焦用澤瀉滑石骨蒸齒黑腹痛足脛瘦用鱉甲地骨皮丹皮當歸生地臀蒸腿細肢腫腑臟俱熱用石膏滑石膚蒸肌肉熱用牡丹皮實熱加黃芩黃連黃柏大黃虛熱加烏梅柴胡蛤蚧青蒿鱉甲丹皮以上出體仁彙編薛立齊云凡此諸症虛勞熱病皆由食肉與油膩房勞飲酒而成者久蒸不除變為疳症即死亦有瘧久不愈以致咳嗽失治漸成骨蒸勞瘵當推標本而治之按薛立齊云蒸病二十四種止簡得二十三種體仁彙編言蒸病亦二十三種且蒸病各異各蒸下注或有或無可見病之險難人罕傳師所以闕漏無憑前後不一俟博觀者補之海藏云以上諸蒸或臟病或腑病或腑臟俱病脈絡氣血交經相屬用藥皆當合而用之君臣佐使上下奇偶表裡虛實逆從通塞汗下補吐咸在其中凡蒸病不已骨節間陰有乾血用行血丸凡血實能令肌肉實腫血虛亦能令腠理膜絡虛腫腫則升降開合失常不能循環接濟而遺溺滑精諸證先見久則枯萎攣縮幻證迭出故治虛勞以補血強筋為主而補血必兼通絡強筋必兼消腫腫者筋急而氣以結脹也消腫即是緩中緩中者內膜筋舒氣活而無脹急也靜參大黃䗪蟲丸當有悟入大黃䗪蟲丸治一切勞傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾地黃十兩乾漆一兩燒令煙盡虻蟲一升水蛭百枚蠐螬一升䗪蟲半升煉蜜丸小豆大酒飲服五丸日三服仲景百勞丸治一切勞瘵積滯未經藥壞症者當歸炒乳香沒藥一錢人參虻蟲十四個去翅足水蛭十四個炒桃仁十四粒去皮尖大黃四錢蜜丸如桐子大都作一服可百丸五更用百勞水下取惡物為度服白粥十日百勞水者杓揚百遍即甘瀾水也立齊先生止述獺爪治蟲不及言古治蟲之方今具於此有心者究焉五鳳丸一肝癆熱生長蟲在肝令人畏恐不安眼中赤壅治以五鳳丸烏雞卵去黃五枚吳萸東行根三升黃蠟三兩乾漆四兩粳米粉半升同入鍋內火煉至可丸即丸如小豆大隔宿不食清晨米飲下百二十丸蟲即爛盡雷公丸一心癆熱有蟲長尺余名蠱蟲貫心即死治以雷公丸雷丸五枚陳皮桃仁各一兩一錢半貫衆蕪荑青葙子乾漆各一兩亂髮一團殭蠶十四枚為末蜜丸小豆大每二十丸空心溫酒下吳萸根湯一脾勞熱內有白蟲在脾令人好嘔而胸中咳吐不出治以吳萸根湯吳茱萸東行根一錢火麻子八錢陳皮一兩五錢水煎服或下蟲或下黃汁凡合此藥禁聲勿語方驗五膈下氣丸一肺勞熱瘦損有蟲在肺令人咳逆氣喘所謂憂忿氣膈寒熱皆膏肓之疾針灸不到治以五膈下氣丸麥冬五兩蜀椒一兩遠志防風細辛生薑甘草各五錢百部人參白朮黃耆各七錢五分桂心二錢五分杏仁二十四粒上為末蜜丸彈子大每服一丸含化忌生冷肥膩千金散一腎癆熱蟯蟲生腎中令人四肢腫急治以千金散貫衆三兩乾漆二兩蕪荑胡粉槐白皮各一兩吳萸五十粒杏仁四十五粒上為末平旦井水調服方寸匕漸加病瘥即止傳尸癆蟲一十八種傳尸自上注下病與前人相似故又曰注化精血歸於元陽之內句似有誤變幻種類最多古怪第一代蟲如嬰兒或如鬼或如蛤蟆遇丙丁日食起醉歸心俞第二代蟲如亂髮或如守宮或如蜈蚣或如蝦遇庚辛日食起醉歸肺俞第三代蟲如蚊如蟻或如蜣螂或如刺蝟遇庚辛日食起醉歸厥陰第四代蟲如亂絲或如豬肝或如蚯蚓如蛇遇戊巳日食起醉歸脾俞第五代蟲如鱉龜或有頭無足或有足無頭或如鼠或如精血遇甲乙日食起醉歸肝俞第六代蟲如馬尾有兩條一雌一雄或如鱉有頭足尾或如爛面或長或短遇癸亥日食起醉歸腎俞古又有九蟲一曰伏蟲長四寸許為諸蟲之長二曰蛔蟲長尺許貫心即殺人三曰白蟲長一寸母子相生其形轉大而長亦能殺人四曰肉蟲狀如爛杏令人心煩滿悶五曰肺蟲其狀如蠶令人咳嗽六曰蝟蟲狀如蛤蟆令人嘔吐厄逆喜嘔嘈雜愛食泥炭生米茶鹽薑椒等物七曰膈蟲如瓜瓣令人多唾八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲狀如菜蟲形至細微居廣腸多則為痔劇則為癩癰疽疥癬多蟲之害大抵諸蟲皆因飲食不節或飢飽失宜或過飧腥膾炙煿或鱉莧同食以致中脘氣血不運而成積積久成熱濕熱熏蒸與瘀血凝結隨五行之氣變化而為諸般奇怪之形若腐草為螢是也凡蟲症眼眶上下青黑面色痿黃臉上有幾條血絲如蟹爪分明飲食不進肌肉不生沉重寒熱若不早治相生不已貫心殺人雄砂丸又有山澗蛇虺水蛭遺精誤飲其水或草木果實蟲聚誤食以致心腹刺痛或引腰脅時作時止諸藥不效乃蟲症也雄砂丸主之鶴蝨蕪荑乾漆殭蠶各三錢貫衆石榴皮各五錢硃砂雄黃雷丸甘遂各一錢五分上為末米粉煮糊為丸麻子大每十丸五更時粥飲下善殺諸蟲或加麝香少許尤妙又方單用雄黃末酒調下亦可取蟲法凡取勞蟲依五臟方選用必俟其大醉日方可取之取後隨補各臟如取脾蟲後則補脾取腎蟲後則補腎若病甚者不分臟腑只用追病丹以斷其根又有輕者用鰻魚煮食或紫河車單陽虛者金液丹最妙取蟲法先令病家以皮紙糊一密室不留罅隙擇一老成人過遞以安息水灑其過遞之人身以雄黃雌黃塗耳目口鼻上備鐵鉗一把布巾一幅用香油二斤入鍋微煎令沸仍用高桶一隻置石灰在內生布巾蓋桶口俟月初蟲頭向上卻服取蟲藥五更初一服五更三點時一服服後腹中疼痛如刀斧擘總不妨也至巳時必須下蟲或取臭穢如膠漆或吐瀉膿血塊皆於灰桶中其蟲或從汗出如紫蠶苗狀或從耳鼻口中出或小便出怪形不一或青黑或黃紅大者即用鐵鉗取入油中煎當日將油紙裹入瓦瓶內石灰填實埋於深山遠僻處以杜傳染其患人衣被席床盡皆棄之醫者付藥遠避其取下蟲色白者食臟腑脂膏可三十日服藥補之色黃赤者食血肉可六十日服藥補之色紫黑者食精髓病傳至腎可謂極矣冀其萬一或為子孫除患則可又蟲白頭者亦難治此危氏說也丹溪云不必深泥追蟲方紫河車丸河車一具焙乾龍膽草甘草各二錢鱉甲五錢大黃苦參黃柏知母貝母敗鼓皮人中白各二錢半桔梗胡黃連二錢半犀角莪朮芒硝各錢半辰砂一兩為末蜜丸梧子大辰砂末為衣每服捻丸至三十丸腹熱食前溫酒下膈熱食後溫酒下傳尸癆瘵俱可下其餘勞怯一月平復天靈散天靈蓋二指大檳榔五個麝香阿魏甘遂安息香各三錢硃砂一錢上為末每服三錢用薤白蔥白各十四莖青蒿二把甘草桃枝柳枝各五寸桑白皮石榴根皮各一片以童便四大碗於瓷器內文武火煎至一碗去渣分作三盞調前藥末五更初服男患女煎女患男煎服藥後知覺欲吐即用白梅含之五更盡須下蟲及惡物黃水黑糞如未下良久又進一服天明更進一服如瀉不止用龍骨黃連等分為末白水調下及白梅粥補之白薇湯白薇當歸各一兩人參甘草每服五錢水煎倉公散治卒中鬼擊心腹如刺下血不省及臥魘齧腳指不覺並諸毒等症皂莢藜蘆雄黃研礬煅研各等分每用少許吹入鼻中未嚏再吹以得嚏為度內鼻散治尸厥脈動亂而若死用石菖蒲末納鼻中仍以桂末安於舌上蘇合香丸亦可硫黃散治尸厥不省四肢逆冷腹中如雷鳴或痰氣不降焰砂半兩硫黃一兩各為細末每服三分酒調灌之良久再服即蘇慎柔以勞損劈分兩病用意甚是命名殊非前人虛勞損極只以病之深淺立名損上損下舉賅其中何者陽自上熄外感之傷必先內虧陰自下漓內虧之久必兼外感其治法固有初中不同究無專攻亦無蠻補陰陽之際微有偏重兼顧之辨而已至於癆瘵別是一病內夾奇邪前人別以殺蟲毒藥加補藥治之似本草所謂鬼注蠱毒西醫所謂長蟲細蟲扁蟲及遺傳諸證雖其本必由正虛究與虛損之病由於六淫七情迥異本是兩病不待剖析慎柔以損上損下為勞損之辨是一病分二又以瘵為損下之勞是二病混一獨其論治虛損以出汗見血為轉關實為扼要中肯與張石頑虛損各案吻合直接仲景真傳迥非專主陰柔溫潤可比世固有見汗見血而速死者仲景所謂衛氣前通陰氣前通絶證也此係真氣充周血脈流暢榮衛交通勞也者過勤之謂也內經曰四時陰陽生病常起於過用或過於勞心或過於勞力或過於房室或過於飢飽而其機尤在過用之後重感於邪使勞氣不得休養如勞力之後汗出而外撲風寒口渴而內傷生冷腠理外閉經絡內凝其逼迫離位之氣血為所吸攝不得反其故道經絡氣血俱困謂之虛勞此時急治得法猶可一撥即轉以其機尚靈也遷延誤治機鈍勢折陰陽開合舉失其樞所謂真邪相攻亂而相引也臟腑肌肉俱減謂之勞損復連殗殜之名即由於此以其困而又困不能振新也五臟真氣不能相濟四時更代陰陽竭絶骨萎髓枯形脫色壞窮無復之矣謂之勞極此時惟專由邪傷藥誤而稟賦素強根氣尚伏肉脫未盡尺脈尚能緊而不斷者猶可挽救治之須知五行生化輾轉相資之義臟氣天氣循環相應以緩待之若大勢日下不及輾轉庸有幾乎凡體倦困臥不能反側及寒熱似瘧而無汗溏泄腹痛而面赤胸痹氣阻而無嘔吐皆上下內外斷絶不續之極陰陽俱竭也治法當氣血初困之時行氣為主行血佐之或微加酸斂或微加苦堅東垣甘溫除熱升陽散火諸法可用於此時及肌肉已減當用血肉之品補血為主行氣行血佐之苦酸堅斂皆在所後逮至勞極法不外此而飲食之調起居之慎導引之勤尤不可忽人身為血肉之體虛勞以積久而成決非草木所能效靈旦夕所能奏效此中進退消息有不在形跡間者當轉關時氣化將通未通往往有衝突格拒之象如胸痹氣阻中滿食減頭眩心煩咳嗽多痰筋骨脹疼肌膚胕腫鼻塞聲甕寒熱往來等象屢轉屢變進退無常即至見汗見血機已大轉仍不免時時發動發動愈勤轉關愈速全在病家醫家細心體察以靜參之彼以血肉為膩而戒之或用之不得其法以致困者是悖也證減即喜轉變即憂毫無真見用藥反時時錯過好機會者益悖也天下萬病情形之變幻治法之微妙未有甚於虛勞者癆瘵一門證雖奇險尚無許多變化其治法尚無許多曲折也讀書臨證悉心揣摩其難易當默喻之
