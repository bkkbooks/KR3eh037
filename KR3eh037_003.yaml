body:
  text: 卷三虛損第三脈法脈經曰脈來軟者為虛緩者為虛微者為虛弱者為虛弦者為虛細而微者血氣俱虛小者血氣俱少仲景要略曰脈芤者血虛沉而遲者脫氣又曰血虛脈大如蔥管又曰脈大而芤者脫血慎齊先生云浮大脈見於右尺為假火假火按內傷施治凡損病脈數為胃氣不足若轉緩弱即胃家生髮之兆矣左脈微細不起右尺帶數或浮大調治非二三年不愈也緊數之脈表裡俱虛緊為寒傷衛數為血不足肺緊則肺氣不足不能衛皮毛而畏風寒脈數則陰虛火動脈緊猶有胃氣脈數則無胃氣以脈緊為有胃氣真見到之言然亦須審有無伏陽在內若緊而孤即凶內傷作瀉而肺脈豁大者難治病久而脈弦者轉瘧方愈脈緩者轉痢方愈蓋久病得氣血活動故轉病也脈數不得汗即生腫毒方愈兩尺無脈是濁陰在上痰凝氣閉肺不下降金不能生水而成痰厥此吾所謂吸攝也肺氣上閉如王啓玄雲虛管溉滿捻上倒懸而其下滴水不能漏經曰上部有脈下部無脈其人當吐吐則濁痰湧出上部疏通肺氣下降於腎少陰上升於巔而有生髮之機矣仲景云陽脈澀陰脈弦當腹中急痛尺為陰寸為陽陰脈弦水挾木勢而侮土也陽脈澀者澀為氣有餘是氣分有伏火也火鬱在上水盛在下故腹急痛寸口脈微尺脈緊其人虛損多汗此陽弱也衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰則面色黃榮氣衰則面色青榮為根衛為葉枝葉枯槁而寒栗咳逆唾腥吐涎沫也趺陽脈浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶寸口脈微而緩微者衛氣疏疏則其膚空緩者胃實實則谷消而水化也谷入於衛脈道乃行水入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩趺陽脈微而緊緊為寒微為虛微緊相搏則為短氣以上數條所稱微脈皆謂起伏短小非形細亦非力弱也故主衛氣少陰脈弱而澀弱者微煩澀者厥逆趺陽脈不出脾不上下身冷膚硬少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕脈見短數則無胃氣細數緊數俱非吉兆洪大按之下者虛損之脈下下似當有空字凡虛損之脈命門火旺腎水不足心火剋金木燥土乾五火交熾若用知柏之品滋陰降火是猶乾鍋紅烈之中傾一杯之水反激火怒立地碎裂矣若脈帶緩是胃氣未絶猶可調理用四君加山藥引入脾經單補脾陰再隨所兼之症治之土能生金金能生水水生火自降矣虛損肺脈數大者須防作瀉江篁南云得之好內者其脈芤而駛真陰損熱內生也緩而弱者重傷於苦寒劑也汪石山云凡見數脈難治病久脈數尤非所宜脈或浮澀而駛或沉弱而緩者脈之不常虛之故也虛損轉潮熱泄瀉脈短數者不治損脈致病次序扁鵲曰損脈之為病若何一損損於皮毛皮聚而毛落二損損於血脈血虛不能榮於臟腑三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈為病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死損脈損症扁鵲曰一呼二至一呼一至名曰損人雖能行獨未著床血氣皆不足矣再呼一至再吸一至名曰無魂無魂者當死人雖能行名曰行尸治損法扁鵲曰治損之法若何損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精氣五臟逆傳致病訣汪石山云余治一人年二十餘病咳嗽嘔血盜汗或腸鳴作泄午後發熱診其脈細數無倫次語之曰難經云七傳者逆經傳也初因腎水涸竭是腎病矣腎邪傳之於心故發熱而夜重心邪傳之於肺故咳嗽而汗泄肺邪傳之於肝故脅痛而氣壅肝邪傳之於脾故腸鳴而作泄脾邪復傳之於腎而腎不能再受邪矣今病兼此數者死不出旬日之外果期而歿所云邪者因自病之極不能自安而侵凌於上也隨筆承製生化論自虛為人所乘其勢順自病而反能乘人其勢逆即此義虛損死證經曰肉脫熱甚者死嗽而加汗者死嗽而下泄上喘者死嗽而左不得眠者肝脹嗽而右不得眠者肺脹俱為死症當云脹在肋上近腋屬肺肋下近腰屬肝上下俱脹氣血俱痹靈樞云皮寒熱不可附席毛髮焦鼻槁臘不得汗取三陽之絡以補手太陽肌寒熱者肌肉毛髮焦而唇槁臘不得汗取三陽於下以去其血者補足太陰以出其汗骨寒熱者病無所安汗注不休齒未槁取其少陰於陰股之絡齒已槁死不治厥亦然劉河間曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛損自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損自下而上治之宜以苦酸鹹過於脾則不可治也自上而下者由肺而心而胃自下而上者由腎而肝而脾論曰心肺損而色敝腎肝損而形痿谷不能化而脾損漸漬之深皆為虛勞寒熱論汪石山論寒熱互發者蓋氣少不能運行而滯於血分故發熱血少不能流利而滯於氣分故發寒仲景云陽入於陰則熱陰入於陽則寒是也寒則戰栗鼓頷者陰邪入於陽分也熱則咳痰不已者陽邪入於陰分也此則陰陽兩虛故相交併而然也慎齊云傷寒寒熱往來系邪在半表半裡內傷寒熱系氣血兩虛氣虛則發熱血虛則發寒凡肌表發熱皆邪陽勝正陽虛也用黃耆附子所以助陽蓋陽氣既虛黃耆性緩不能到表須得附子雄壯之氣引耆直走於表助之成功也五臟致傷靈樞云神傷于思慮則肉脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮槁志傷於盛怒則腰脊難以俯仰也虛損致病之由褚先生精血篇云男子精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便道澀而為淋精已耗而復竭之則大小便道牽痛愈疼則愈欲小便愈便則愈疼又云女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或潰而入骨或變而之腫或雖合而難子合男子多則瀝枯虛人乳産衆則血枯殺人觀其精血思過半矣立齊先生云夫月水之為物乃手太陽手少陰二經主之此二經相為表裡上為乳汁下為月水為經絡之餘氣苟外無六淫所侵內無七情所傷脾胃之氣壯則衝任之氣盛故月水適時而至然有面色萎黃四肢消瘦發熱口乾月水過期且少乃陰血不足非有餘瘀閉之證宜以滋血氣之劑徐培之使經氣盛水自依時而下又云凡放出宮人及少年孀婦年逾三十兩跨作痛而膚不腫色不變或大小便作痛如淋登廁尤痛此血瘀漬入隧道為患乃男女失合之證也若漬入腸胃即為血臌經云腹裡大膿血在腸胃之外小便澀而奇痛不可作水利之丹溪云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則易動心動則相火翕然而隨雖不交合其精暗耗矣亢則害承乃制論慎齊先生云在上益下謂之濟以下犯上謂之亢水火濟制則無病而多壽譬若火生亢拒則金氣受傷而金之子為水水能剋火子報母仇而火反受其制矣蓋造化之常生則必克克則必生不能以無亢亦不能以無制焉耳故又曰制則生化所以有病久自愈者亦亢而自制剝生復也苟亢而不能自制則湯液針石導引之法以為之助譬如水固能制火而腎水本涸之人豈能以涓滴救其燎原哉明乎此理而補瀉運用之妙自超越於尋常之外矣又云人之一身生死繫於脾胃凡傷寒雜病一七後只當於脾胃求之始免殺人之咎東垣云補腎不若補脾此之謂也然調理脾胃之法須明五行化氣制克之理譬如木乃水生獨水不能生木水為木之母剋水者土則為木之父水土相兼則少陽木生此河洛生成之義也若脾土衰耗之人金失所養水枯火熾木且成灰矣凡補瀉法瀉其有餘因不足者瀉之補其不足因有餘者補之譬如木盛因於肺虧當瀉南方以制肝使火無相剋則肺自清金衰因於火盛火盛則水虧當補脾以養金則水自長蓋土常不足最無有餘氣血貴於中和偏勝者乃邪傷也瀉其有餘是瀉邪也補其不足是補正也氣有餘者非氣也火也初因氣不足漸化為火燒爍真陰為害滋大人之一身以血為主血以氣為先二語似平淡而超卓千古前人重氣不重血西人知血不知氣人之百骸五臟由血長養而氣所以運化夫血以遂其長養也悟此乃能養生乃能制病當補血中之氣四物加肉桂補氣中之血保元湯加減治病不可忘血亦不可忘氣忘血則四肢不能用忘氣則體無管攝平和之藥氣血疏暢宜多不宜少寒熱之藥不過卻病宜少不宜多多則大傷脾胃虛中有實正虛生實邪實中有虛實邪由虛致實以瀉為補虛以補為瀉言不能盡學者研究之可也東垣脾胃論盛衰用藥禁論豈可不熟讀乎虛損誤藥之辨凡得勞心嗜欲七情飲食縱酒飢飽過度此內傷也初不自覺久則成患以致身熱頭痛惡寒或因微熱脫換衣服腠理不密易感風寒症類傷寒實非傷寒醫不明此驟用麻黃紫蘇荊芥大發其汗熱未退仍以寒涼瀉火之劑下陷清氣濁氣轉升故食下腹滿又大下之故中愈不足以致汗多亡陽下多亡陰陽耗散死不旋踵實醫殺之耳傷寒發表汗透而愈內傷寒熱間作不齊發熱而微汗至頸或臍而還臍字誤仲景劑頸而還劑際也謂汗僅在頭齊頸而下無汗也口不知味似瘧非瘧或兼泄瀉醫與諸傷寒藥不愈如是者名曰內傷雜病多端汗而又熱熱而又汗亦頭痛發熱或自語煩躁不思飲食遍身骨痛者用補中益氣加羌活或泄瀉而熱不退此陽虛也補中加附子頭痛甚加蔓荊子川芎或無汗而熱不退亦補中或咳嗽痰中帶紅亦補中此病裡虛不足反用汗下清利死可待矣內傷病中有泄瀉嘔吐腹脹疼痛咳嗽清涕四君加和中散無有不效元氣藏於腎中靜則為水動則化而為火腎者肝之母也元氣足則肝子足以承乎心心為主神明出焉元氣不足心神失養相火抗拒脾土受虧金衰木旺諸臟皆病矣惟胃氣不絶用藥力以培之庶可冀幸萬一生脈散加參耆或保元之類是也但見潮熱宜補中火熾宜發用升陽散火湯虛而不瀉宜血分中補氣保元加滋陰若瀉發困熱宜氣分中補血保元四君加芍藥瀉則加松花如自汗乃陽氣虛加附子內似火爍胸中嘈痛白朮一錢黃連一分陳皮二分神麯為丸細小臨臥時嚼碎津咽下三十丸三日愈則止久瀉傷腎用保元兼四神丸或腹脹和中散並補中脈見平和而病不愈乃藥力未至不可改換倘不愈又脈見細數緊數皆邪脈變異更兼嘔吐不祥之兆也又口失滋味不思飲食不可誤作胃絶是內有虛火當滋生元氣不可以燥劑動火蓋總以脾胃為主脾胃四季皆擾常自不足傷寒言陽明有餘因火邪鬱於胃中故瀉胃中之火耳虛損由於內傷證與外感相似外感頭疼發熱惡寒其脈浮數有力宜汗解而愈從表入里脈洪大大便燥宜和解通利之內傷亦頭痛發熱惡寒其脈緊數無力宜補中加羌防元氣一足邪氣自散羌活領太陽經而出前證俱退矣不效再一劑自然見汗乃愈庸醫不知此理仍用發表汗至頸而還一旦發似瘧作瘧治之又似痢作痢治之更加發熱庸醫無措手處矣傷寒脈洪大有力內傷豁大似洪而無力亦大便結燥仍用清涼汗下解散之法大傷脾胃則肺已虧矣咳嗽吐痰或吐紅痰又作陰虛火動治之脾土一損雜病多端潮熱似痢似瘧且脾虛不能統血而吐血之症成矣若因火盛脾陰不足血枯之症亦不可用滋陰劑當用救陰之法陰從陽生陽從陰長之義人參白朮蓮子五味甘草白茯苓之類是也噁心加乾薑不思飲食加砂仁胸中氣滯加陳皮泄瀉去陳皮汗多加白朮黃耆惡寒加肉桂吐紅去桂若泄瀉而諸藥不愈胃虛而難受藥者陳臘肉骨灰陳米鍋焦共三分炒松花一分米糊丸人參看輕重虛實用之煎湯送下六七十丸此法活人多矣虛損祕訣虛損之起或久遇勞碌損傷陽氣遂發熱漸至咳嗽或傷風失治或治之不當亦成此症或傷寒汗下失宜久之遂成寒熱之症或飢餓傷脾飽食傷胃治之不妥亦成此症是皆陽氣虛弱倒入於內便化而為火而發熱也須用保元或四君加黃耆再加乾葛以開肌紫蘇以開皮毛病未多日者服十五六劑則自然汗來譬如夏天鬱蒸一二日或三四日遂大雨方涼陰陽和而後雨澤降也又如秋冬陽氣降入地中則井水溫暖至春夏陽升則天地和暖萬物生化井中水冷徹骨矣何內熱之有損病初發十數日間未經寒涼藥可用火鬱湯升陽散火湯及補中益氣湯若久之則火鬱湯不宜用矣保元四君繼之此為第二關蓋元氣已虛只助陽氣不宜散火誤以當歸地黃補血並黃柏知母苦寒有形重味反傷無形陽氣陽氣愈弱愈不升發陽絶則陰亦隨之而絶損病之死職此故也損病六脈俱數聲啞口中生瘡晝夜發熱無間經云數則脾氣虛此真陰虛也此第三關矣則前保元四君等劑皆投之不應須用四君加黃耆山藥蓮肉白芍五味子麥冬煎去頭煎不用止服第二煎第三煎此為養脾陰祕法也服十餘日發熱漸退口瘡漸好方用丸劑如參苓白朮散亦去頭煎曬乾為末陳米鍋焦打糊為丸如緑豆大每日服二錢或上午一錢百沸湯下蓋煮去頭煎則燥氣盡遂成甘淡之味淡養胃氣微甘養脾陰師師相授之語毋輕忽焉損病湯藥加減法有汗用黃耆蜜炙無汗煨用胃虛米泔水炒用表畏寒酒炒嘈雜乳汁制表虛耆多瀉火生甘草熱盛耆草多無汗加乾葛防風升麻柴胡久病熱不退去表藥只用保元血虛加當歸脾虛加白朮渴加麥冬五味虛煩亦加不睡加酸棗仁頭痛宜補中益氣加川芎蔓荊小水不利加牛膝茯苓心神不安加茯苓遠志酸棗仁退火多用參耆虛而動火少加炒黃柏小便不通或赤或白用黃柏知母酒浸炒各一兩肉桂一錢為末開水為丸空心服百丸小便下異物為驗腰痛薑汁炒杜仲惡寒加官桂噁心加乾薑自汗虛寒加附子內傷發熱不退莫如補中益氣加附子耆草倍之甘溫除大熱故也腹脹恐成中滿補中加附子薑桂吳萸青皮麥芽神麯枳殼之類隨手用之濕痰加羌活防風茯苓風能勝濕故也去病之藥不可多服恐泄真氣人無氣不生氣常有餘血常不足前藥皆補血中之氣血無氣不行須用保元獨陰不生獨陽不長保元者保血之元氣耳人稟天地之氣猶恐陽陷於陰分常使胃氣有春夏之令故宜大升大舉使清陽發腠理濁陰走五臟是也蓋人以血為主胃乃生血之源若元氣不足陷於陰分則通身化為虛火變異無常人死莫知其故何也人天庭屬陽下體屬陰天庭一倒其死即速者上陽不生而陰氣絶也故天之陽氣上升即地之陰氣不絶人之陽氣升舉即血之陽布於四肢何病之有倘陽一不升則氣凝澀諸病生焉聖人固不過升降浮沉之法耳虛損諸病久之皆屬脾虛脾虛則肺先受之肺病不能管攝一身脾病則四肢不能為用謹養脾氣惟以保元氣為主或前從瘧痢吐瀉變症總從脾胃治則保元兼溫脾勿用血藥蓋縱有雜症火起不必去火有痰不治痰宜參苓白朮散加減腹痛加乾薑腰痛益智吳茱萸少許小腹疼痛亦宜胃不思食加砂仁木香噯氣神麯腹脹和中散加六君子久病以溫補為主病急則緩治攻則散離書曰大毒治病十去一二中毒治病十去其五無毒治病十去八九慎齊先生內傷治法凡邪火逆行上乘脾位用吳茱萸炒黃連者以黃連瀉火歸於其位所以木沉則火降凡內傷清氣下陷陰火在上者若用寒藥則陽愈陷火愈熾火尋竅出虛者受之或目痛或耳聾或齒痛從其虛而攻之也此所以寒遏於上陽陷於下而反不免有上焦熱證也肺閉則中下之氣為所攝胃閉則上下之氣為所格真陽失道久郁盡化為陰火甚有令人心孔鼻竅日夜如煙燻難受者損病主治湯方門保元湯人參一錢黃耆炙一錢五分甘草炙一錢生三分加煨姜三片黑棗二枚去核水二茶盅煎八分空心服四君子湯人參一錢白朮一錢五分白茯苓一錢甘草炙八分異功散即四君加陳皮六君子湯即四君加陳皮一錢半夏湯泡五次曬乾切片一錢補中益氣湯人參五分補氣之血黃耆一錢炙補氣中之氣甘草炙七分當歸三分陳皮五分白朮七分升麻二分小柴胡三分七味白朮散治中氣虧損津液短少口舌乾渴或口舌生瘡不喜飲冷或吐瀉後口乾最宜服人參白朮木香甘草藿香白茯苓各五分乾葛一錢四物湯當歸川芎白芍熟地八珍湯一名八物湯即四君四物合十全大補湯即八珍加黃耆一錢肉桂一錢和中散治中寒腹痛或寒瀉清水或飲食傷噯麩氣或久痢寒虛乾薑三兩炒黑脾家藥肉桂一兩五錢腎家藥吳茱萸五錢鹽水炒過肝家藥俱用苦烈好大酒頓半熱一杯調下五分生脈散孫真人制麥冬五分去心北五味三分人參一錢升陽散火湯甘草生二錢炙三錢防風二錢五分柴胡八錢升麻葛根白芍羌活獨活人參各五錢每服五錢水三盞煎至一盞去渣熱服忌寒冷物及冷水月餘東垣云陰覆其陽火不能伸宜汗之經云體若燔炭汗出而散是也脈弦而數此陰氣也風藥升陽以發火鬱則脈數峻退矣凡治此證脈數者當用黃柏少加川黃連柴胡蒼朮黃耆甘草更加升麻得汗出則脈必下乃火鬱則達之也柴胡升陽湯治男婦四肢發熱筋痹熱骨髓中陽郁因熱如火燎捫之烙手四肢熱者屬脾土熱伏地中此病多因血虛而得也亦有胃虛過食冷物冰水郁遏陽氣於脾土之中經曰火鬱則發之升麻葛根獨活各三兩防風二錢五分生甘草二錢柴胡二錢炙甘草二錢人參五錢白芍五錢上㕮咀每服半兩水兩大盞煎至一盞去渣溫服忌食寒冷東垣火鬱湯治五心煩熱心火下陷鬱於脾土升麻葛根防風柴胡根炙草白芍各五錢上㕮咀每服三錢或四錢水二大盞入連須蔥白三寸煎至一盞去渣溫服以上三方宜於初發熱之時未服藥之前元氣未傷服之若神若已經服過寒冷已傷元氣火氣亦餒者服此反禍於人無益也蓋虛損初時可以發之故勞證內以上三方不與焉
