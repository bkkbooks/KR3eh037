body:
  text: 卷一師訓第一夫地黃丸為腎家之主劑蓋腎水枯則肝木不榮木不榮則枯木生心火五行字面乃醫家循例之詞讀者當隨文而各求其義此所謂腎水即津液也肝水即血汁也心火即亢燥之熱氣也津不濡血而血滯且干矣血不涵氣而氣亢愈悍矣故曰枯木生心火故用熟地以滋腎用澤瀉以去腎家之邪則地黃成滋腎之功腎所惡者土也脾家有濕熱則能克腎水故用山藥補脾用茯苓以去脾家之濕則山藥成補脾之功木枯則耗水以山茱萸斂火以潤肝火熾亦能涸水以丹皮瀉心火而補心心足則火不妄起且下降與腎交而補腎之功愈成矣此即難經東方實西方虛瀉南方補北方之義又素問亢害承製之道也凡兩手俱數大便燥者八物湯洪大有力地黃湯無力大補湯脾燥加山藥脈弦加芍藥右關浮無力加丁香沉無力加乾薑內傷寸脈大於尺脈此陽盛脈也宜用保元湯加歸芍引下則大脈去而陽氣亦內收矣此從陽引至陰分之法用意甚是而藥不合耆升胃陽歸升肝陽非能降也凡引下法有三有直用清肅有從下滋填有從下溫補更有宣其上而大氣自降者各因其病本也內傷右尺弦弱不宜用寒涼以命門火虛故也右關緩有力緩則為濕又寸尺弱者用補中湯加赤茯苡仁蓋補中補寸弱赤茯苡仁行中焦濕又能使中焦之氣下行而尺脈自和右關緩無力用參苓白朮散加黃耆以補上而益下凡在右以四君子湯加減欲上用黃耆欲下赤苓苡仁在左以四物湯調理若左寸洪有力加木通黃連赤苓之類蓋木通瀉小腸火小腸為心之腑黃連瀉心赤苓者赤入丙丁也左關浮用羌活防風左關沉有力用山梔柴胡知柏之類左尺有力加柏以瀉其有餘蓋左有瀉而無補右有補而無瀉則命門火重矣此謬語也左右俱有水火太過俱宜瀉不及俱宜補即如本文左尺有力加柏以瀉有餘何嘗不是瀉火倘右尺太過豈可復補之凡內傷發熱口乾乃下焦虛寒火不歸元陽氣在上故耳須溫下焦使陽氣下降則口乾自愈此即所謂從下溫補也是下焦虛寒格陽於上所以然者下焦之氣不續升氣無所接引不得順降久結於上化為燥火凡內傷火在上水在下故發咳嗽而喘此皆滋陰降火所致也初用桂制白芍吳茱萸少許及甘草人參五味半夏破故紙杜仲一溫則火下行水上升如或作瀉則陽下行而胃中所積宿食水穀行動矣因滋陰降火而發咳喘乃陽為陰抑水上火下之咎也用辛溫撥其陰而伸其陽生氣勃發而敗氣敗津舉無所容矣故或汗或瀉也內鬱熱甚者略佐清降恐鬱火之發太驟為患也曾屢見之凡虛損肺脈大氣喘下部脈弦細弱微此皆陽上越而不降內寒外熱上熱下寒之症用人參一錢桂制白芍一錢乾薑三分半夏一錢五味子十五粒甘草生炙二分使溫中內收陽氣降下虛損氣喘有氣痹有氣越氣痹有清濕外侵有衛陽內陷氣越有內寒格熱有陰虛陽泛陽陷寸脈短弱而邪侵反弦緊陽泛寸浮散而格熱反洪實以純虛與夾實之故純虛可任補斂夾實有溫宣溫降諸法未可專任補斂其吉凶全視尺脈有根無根相稱不相稱以決之何者純虛肺氣弱夾實肺氣困補斂固以振弱亦以增困上焦氣閉三焦大氣舉為其所吸攝不得動轉順降所謂宗氣反聚也氣化不通升降不續喘逼反甚故治法須有以開為斂以降為補之妙用凡久病服寒涼克伐過多以致三陽氣衰致痰凝氣滯以調元之劑治之陽氣一動則少陽先升少陽欲先出前有太陽後有陽明遏截不能伸少陽之氣至太陽太陽與之並則寒與陽明並則熱遂成寒熱瘧狀非真瘧也其太陽氣達遂有傷風之狀鼻塞惡風寒之症見矣陽明氣達則有作瀉之症此時正當調脾補元分頭施治則舊病盡脫矣此條開人神智不少凡服寒涼克伐之過遂成血凝氣滯用溫補之劑其痰決行脈氣漸和須預言將來或有凝血少許此乃通經氣壯而血行也此可悟葉天士久病通絡之義凡脈細數腎虛弦數肝虛短數肺虛此為病重之脈有胃氣則生無胃氣則死散數則為心虛諸數之中尚有舒徐和緩之意者是云有胃氣也來高去深旋轉不躁是為舒緩凡虛損脈數十數至尚不細短按之有一條者可服獨參湯一二兩然後調理此脈率因下寒格陽不能歸窟宜附子加龜板以招安之凡脾脈細弦而澀則中氣虛寒宜溫直用溫藥則火起須益智溫之更用山藥以養脾則益智之溫退居下焦補命門火生土遂成連珠之補而火不起矣直用溫藥則火起血虛不能涵之也宜介類如龜板鱉甲牡蠣之屬同用非益智所能為功能任益智者其陰虛猶未甚虛損大便燥者用杏仁枳殼蘇梗則能去宿糞嘗診一人脈右關浮大乃陽氣浮上症當中寒果然肚疼作瀉宜用建中湯收陽入內而中溫矣凡持齊人所食之物皆淡滲所食之油皆屬火滲淡瀉陽陽虛則火起此東垣云持齊之人多胃虛滲淡瀉陽四字極是故風濕在表寒濕在裡者均不可率利小便也陽虛火起亦有理而缺發明蓋火性宣發遂其宣發之性即不見火矣故內經五臟苦欲補瀉之義最宜講究凡久病用補脾補命門之藥皆燥劑須用當歸身以潤肝恐燥能起肝火故也立意極是而以當歸為能潤肝燥貽誤非淺其辛溫正起肝火也血分虛寒宜之虛燥者復與燥劑同用必致頭眩肋脹不若鰲甲牡蠣介類潛陽而又清靈不膩一痰症曾有人病癡寸脈不起腳冷關脈沉洪此陽氣為痰所閉宜升宜降宜開用紫蘇陳皮半夏赤芍赤苓枳殼乾葛石菖蒲遠志人參之類其病欲言而訥但手指冷冷字疑誤或是物字或是空字此心系腦絡脊髓之間有瘀痹之脈阻其神機不能靈轉也屬血加桃仁丹參屬痰加如下方此乃痰閉陽氣之病治宜歸脾湯去棗仁圓眼黃耆加石菖蒲遠志半夏一補一開一行後用全料歸脾湯久自愈病人久虛內有宿積舊痰用參術補之久乃吐出臭痰或緑色痰當不治蓋積之久而脾胃虛極不運故郁臭耳此症有因蠻補而然者或可治或不治須別視見證決之一人常夢遺診其脈關中有動脈如大豆圓此痰凝中焦幸夢遺免鼓症夢遺之道甚多而總歸於心肝二氣之下陷但有下虛而陷者有脾虛而陷者有心肝自虛而陷者有外感遏制肺與膀胱之氣而陷者有痰涎遏制脾胃之氣而陷者各以其脈與兼證別之關動如豆胃有死血也曾見夢泄人舌心如錢大光滑無苔即同此診且寸尺俱不起補中加茯苓半夏石菖蒲亦一升一降之道也一人久悲鬱先前五六月倦甚尋得癡症只以手空指人問為何曰我欲言而不能也欲言屬心不能屬腦腦絡有痹而然診其脈二尺微而不起二關洪緩此陽鬱而不能升不能降也用二陳湯加人參以開瘧助脾益以升柴助陽石菖蒲遠志赤茯苓以利濕降痰降火四劑即安緩服丸劑而愈吐血症初六脈俱洪數須用茯苓補心湯蓋白茯苓能守五臟真氣能泄腎中伏火能瀉脾濕以健脾二三劑後數脈稍退尚洪以地黃丸納氣洪稍減至弱以四君子加減補脾生肺肺生水之義如或見血加丹皮熟地右關有火加山藥左關有火加山茱萸左關左尺有火加茯苓澤瀉熟地一人吐血後右關尺洪大便燥口乾用白芍甘草人參蘇梗歸身各五分枳殼五分杏仁四粒黃柏二分二劑下即潤諸症即退凡欲止吐血須炒黑乾薑五味子二物以乾薑性溫且血見黑即止五味子味酸能收逆氣一人頭面俱痛服寒涼藥多其脾胃脈細澀左尺亦澀左寸關洪此下焦寒而火邪逆上之故也用羌活五分酒炒防風五分酒連一分酒苓三分白茯苓一錢人參二錢甘草五分半夏一錢破故紙一錢枸杞子一錢二服脈即粗而不細而頭痛亦除治梅核氣用四七湯加人參一錢乾薑三分細辛二分桂芍一錢半夏一錢此皆下氣散痰溫中升陽之劑非細辛之升陽上焦無陽則痰氣焉能得動此症因憂鬱而成者因稟賦不足傷於房室與勞倦而成者十居八九與痰何涉即以為痰亦是燥痰未可用辛燥也此非喉中多一物乃其處無血溫養木而不仁遂如有別物附之由於任脈血虛不周於上督脈氣虛不交於前氣血兩脫於上也下焦燥盛者龜鹿大劑急施久服或可挽回兼溏泄者萬無生理凡癆疰病須用金銀藤葉煎湯藥如肺虛加保元五味子心脾虛歸脾湯六脈俱有火而虛八珍脾肺虛補中腎脈洪大地黃湯凡病久嘔用補脾下氣之藥其中須用當歸錢許以潤下枯蓋氣在上久而不下下無津液故用潤之然脾胃虛而嘔者又忌當歸肝熱與中焦濕熱為患者並忌之五月火月六月濕月火旺則生濕二者相併肺金受克則熱傷氣而痿倦之疾作矣故設清暑益氣之法黃耆助肺人參助元氣甘草瀉心火則元氣復而肺氣清濕熱盛而胃氣不清故加蒼朮濕熱在中而飲食不化故加陳皮青皮以開胸膈加神麯以助消飲食小便赤澀加澤瀉以去下焦之濕口渴加葛根以解肌熱又能接胃家津液上潤胃家濕熱盛則腎水受克加黃柏以救腎水濕熱盛則陽道遏而身熱加升麻以升陽又走表以益陽而門冬清心五味斂肺恐濕熱傷肺故耳五苓散為四五六月時令之藥五苓散非可常服之藥令人畏發散而喜利小便其禍甚大蓋人之病從毛竅來者十九即從呼吸入者亦借發散之功以鼓動陽氣俾得吐故納新若利小便必病從下而上及飲酒飲水得之者可耳過用即傷膀胱元氣三焦下陷不可復元矣曾屢見之蓋濕熱盛則三焦氣不清上咳中滿下瀉等症作矣豬苓清上焦茯苓清中焦澤瀉清下焦恐濕熱盛而不化故用白朮以健脾然陽氣不到則濕不去譬如日所不照處地不易干用官桂之辛升至表引表之陽氣入里里得陽氣而濕即行矣此方可升可降可吐欲吐先煎前散冷服次飲熱湯一碗即吐欲利小便溫飲欲發汗熱飲時至初秋陽氣下墜因夏初之濕熱尚在胸中而有痞滿不寬之症須用不換金正氣散以去濕濕去則金清金清則降下之令復譬如主人久不在家家中穢汙所塞須掃除穢汙心俟主人回之意截瘧方用白朮五錢當歸三錢陳皮二錢雄丁香五枚烏梅三枚母丁香四枚水一大碗浸露一宿五更去渣取汁溫服蓋凡久瘧則內傷五臟俱虛內起火發熱火所畏者水也以水浸藥略溫服之則火見水而火退矣火退則諸藥皆能成功白朮補脾當歸潤肝陳皮消痰丁香溫胃烏梅斂肺潤下其病痊矣露一宿以收清陽之氣五更服者子一陽生至寅三陽足矣久瘧可用初瘧再加散邪之藥凡右關浮緩此陽氣在上中已虛寒主肚疼之疾秋來主有瘧痢蓋內已虛寒受邪已深至秋陽氣下降入腹而正氣已旺宿邪不能容故發此二疾邪輕則瘧重則痢皆正旺而邪退故也瘧疾二尺細此下焦寒也溫下則瘧可以去矣不然亦成脹凡豁大脈久病按下尚渾渾一條此陰陽未離猶可治之若下無一條開在兩邊此陰陽已離法不可治此脈常主作瀉蓋豁大陽虛不能固下而陰與陽不相合故下不禁而作瀉也臥病日久不宜此脈若帶病作勞身燥氣促而脈散者未可徑汗之凡久病人脈大小洪細沉浮弦滑或寸浮尺沉或尺浮寸沉但有病脈反屬可知如久病浮中沉俱和緩體倦者決死且看其面色光潤此精神皆發於面決難療矣此條論死脈極驗體倦二字著眼此時大率神清音朗而長臥不能反側也凡肝脈細餘脈和緩周慎齊用補中湯加枸杞即愈以枸杞補肝故也凡寸脈大陽邪勝則病者亂而言神陰脈勝則病者亂而言鬼病重藥宜輕宜少只以固中劑三四味漸漸取效只言陽邪陰邪未晰氣在血上多言神亢吉散凶血在氣上多言鬼郁吉陷凶亢郁可治散陷脫也大抵吐極難醫瀉極難醫凡久病左尺浮大宜補肺氣須保元加白芍白茯苓之類蓋金能生水之義大抵病在上宜求之下在下宜求之上凡用藥有用味留氣者須熱飲為妙倘有畏服熱藥者以水灑藥面上即氣收在內是留氣也凡四時之令皆有寒熱溫涼有及時來者謂之正令譬如春宜溫而反寒謂之不及春宜溫而先熱謂之太過宜溫而寒用香蘇散解之如當春得正令夏初反復嶛峭其春初之令未除也猶宜香蘇散解之倘春遇極溫即為太過則口渴舌燥之症見矣第發熱而不惡寒者謂之溫病此溫令之過治有溫病條說具四時各有時令之病各有時令之過咸以此類推之若夏時四五六月正當夏令而寒凜凜猶春初之意香蘇猶不免耳若當時小便赤口渴等症見此時令症也宜五苓清暑益氣十味香薷之類治之若當時不熱至秋七八月天氣暑熱人患前症仍以前湯治之是治其不及之症而調其不及之候也譬如春天正令三月溫和偶或風寒大作即有感冒傷風寒之症若五六月正令大熱偶或大雨遍地塵熱之氣為寒雨逼入人家即為受暑之症宜清暑益氣湯解之凡診老人及病人六脈俱和緩而浮二三年間當有大病或死何也脈浮則無根乃陽氣發外而內盡陰火也陽衰於外陰竭於內即洪緩而按之無一條者也最忌喘促瀉利與徹夜不眠飲食日減四肢無力等證急用保元或建中服之則陽氣收於內即反見虛脈或弦或澀此真脈也宜照脈用保元助脾之劑脈氣待和病亦尋愈壽有不可知者此條說得好嘗見老人冬月體倦少食畏寒右寸短左關陷兩尺緩長或左尺微陷立春加病春分死未有能延至立夏者金敗水枯木無所生也兩尺緩長所謂緩臨水宮也大凡內傷症下俱虛寒凡病肺脈浮大即喘用溫脾斂肺之藥斂不下則成脹既斂下肺脈猶大則成瘧若遍身發瘡浮大無妨矣右關浮大則肚疼建中斂之斂不下則成痢皆內傷之症
