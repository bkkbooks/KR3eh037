body:
  text: 後跋程瘦樵每以舊醫書餉予前歲得睹王太僕元和紀用經及白飛霞韓氏醫通既抄錄而珍襲之矣今夏復以慎柔五書示予予觀其書凡治諸症皆以保護脾胃為主淵源本於東垣而化裁宗諸薛氏其於虛勞之症截然兩分治法不混更發前人所未發洵為醫家可寶之書也手為抄錄不憚煩暑亦以見老年嗜好云爾乾隆丙午秋七月後學王陳梁識時年六十有五
