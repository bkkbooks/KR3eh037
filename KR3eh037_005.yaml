body:
  text: 卷五醫案第五風例金壇孝廉蔡長卿令堂年六十餘六脈俱數八至按之中沉則滑而實惟肝腎二脈洪大而虛經曰數則為熱滑則氣有餘而血不足此陰虛陽陷菀極而暴亂者也外證則唇欠目扎手搐身搖面色紅白不時遍身熱火攻刺自言心中昏悶四肢浮腫硬堅此皆風火搖動之象陰虛陽亢之症正經所謂熱勝則腫風勝則動也宜滋陰抑陽用四物湯以養血為君加山藥以扶中氣為臣佐山萸以助陰養肝使黑柏二分以引經陳皮理胃氣為俾佐服二劑診之數脈退去一至又服四劑又退一至而昔日之虛洪稍收斂有神矣外證四肢腫硬漸平攻刺亦無心中不言昏悶又四劑前之硬滑俱已空軟數亦更減然真陽未復邪火未盡退也以六味丸料四兩作一劑頓服之腎經洪大脈全斂而火退矣復因夜間取涼太過至下午覺身寒唇昏紫黑此邪火退而陰陽俱虛急用人參三錢白朮一錢甘草三分白茯二錢當歸二錢附子一錢八分官桂二分服至一茶盞前方已非全合此方更非針對其愈者幸也本人體壯非藥之功覺身大熱口乾時索水飲發熱此真氣虛不相合和降不下故也至初更診之六脈俱細急短數略無和氣予甚危之至明日再診則有神氣尚有六至余此陰陽未全克復元氣未充耳教以朝服六味一錢五分間日服補中湯數十劑而愈劉某夫人年及三十稟體元弱未病十日前身如舟中行後忽遍身痛臍下痛牙關緊不言目瞪汗出大小便不通身熱此下寒上衝血隨氣逆相搏而不得降也延余視之診其脈俱浮細來往不定一息十餘至重按則無退而思之外證皆屬陽虛脈又無神臍下痛甚目瞪至死而醒陽和之氣欲絕而胃氣虛升降失司故大小便不通且東垣云裡虛則急以此思之則內外俱虛宜先建中將四君去茯苓加歸耆各二錢熟附二分午時服一帖遍身痛稍緩而小便溺矣申時又進前劑汗止遍身痛己大便亦通但臍下痛不減及兩脅痛此陽虛也寒甚也又加附子五分臍痛止矣但大便了而不了有欲出而不出之狀正東垣所謂血虛加當歸身一帖而愈李子才年四十餘素性暴忽因怒卒暈倒必怒未得泄脈浮中無沉按數六至此陽虛陷入陰中之證以補中益氣加六味丸料少許四帖而愈一少年忽不思食噁心偶逢文期強作文一日晚即頭暈作嘔餘脈之二寸洪緩以為勞碌而動心火遂以加味逍遙散二劑嘔不食病亦不減其年正二三四月淫雨此濕勝而然也此濕從上受遏其清陽以太無神朮散一劑即不嘔惡第頭暈未除二寸脈猶如故其脈狀有焰焰欲發之意用前劑加紫蘇防風取微汗頭暈除脈亦退第不思食耳六君子一劑飲食如常周近庵令愛年十九左耳下紅腫發熱作痛脈之六部俱數八至無神且素弱經水不調予曰此運氣病也以小柴胡合四物加牛蒡子內黃芩用酒炒四劑而愈此病曾治之輕者此方恰合近庵令子室年二十餘兩耳下俱紅腫痛甚發熱其狀可畏醫者以大黃行數次又用敷藥反覺坐臥不安亦運氣病也診之六脈俱細數少力噁心不食先以人參敗毒散一劑以發之又用甘桔加牛蒡射干陳皮半夏含漱之次將小柴胡湯內加牛蒡六劑而腫消飲食猶未貪異功散加牛蒡四五劑脾胃健而全愈馬山徐云所六月受熱受勞又飲酒忽上膈不寬如刺痛頭暈且重自以過食曾以指探吐即枕不得惟坐而已予診之二寸俱洪緩有力關尺俱弱帶弦此濕熱上干清陽之分故頭暈重胸膈痛此時症耳用平胃加半夏黃芩紫蘇木香取微汗此症即退就枕平復淮安客年三旬外季夏患癉瘧單熱不寒連日發於午後熱躁譫語至次日天明才退數日後忽腹痛晝夜無間勺水不進呼號欲絕遇瘧發時即厥去延醫治之投藥皆不效求余診脈弦細而濡余謂弦細為虛為暑而濡為濕蓋暑邪為瘧濕熱乘虛內陷而腹痛用酒炒白芍炙草五分水煎調下天水散五錢服後腹痛如失次日瘧亦不發此案看似尋常實非老手不辦論證用藥均極堅實第痛厥皆屬血滯似宜酌加桃仁丹參痢例甲辰閏九月間天氣寒熱不時痢者甚眾予四弟永穆年二十七歲忽患痢下紅腹痛後重已三日矣來取藥付以芍藥湯一帖香連丸二服不止反增心口如刀劙當臍腹痛肛門痛亦劇聲撼四鄰自分必死告母決別因整囊往鄉視之晝夜不得臥次數難定日下紅血一桶痛不可忍發熱流汗不食脈之六部皆豁大浮中沉無力四至予曰雖痛雖發熱脈無力已虛寒矣古人云脫血益氣此證正宜遂用異功散加升麻三分木香五分炒乾姜五分一劑去後覺疏痛亦可忍至五更腹痛如前予曰此藥力盡也急煎一劑與之比前愈疏痛亦減七八即酣睡至日中方醒云不甚好過予又曰此藥只能支持一覺再煎與之遂安寢至晚痛止後重亦可還服前劑而愈一二日後因吃雞肉仍前腹痛肛腫穢下不止第三日病勢篤極復報予診之脈三至余浮無沉按之則大脾命脈微與補中益氣湯不應此虛脫之甚加御米殼一錢亦不應下如洞泄流汗發躁尺脈漸欲收斂予亦慌急令人二更後往城取參至早歸補中益氣加人參二錢服之下咽常憒參能令人憒濕熱內盛者尤甚歷試驗之此正氣欲復邪氣欲退也頃之精神頓增痢稍緩恐再作又一劑下注昏憒發熱躁諸症漸緩脈亦有神短脈退尋思久之古人云久泄久痢湯劑不如丸散即合參苓白朮散與服覺疏下至下午復躁熱予再脈之左尺洪如火射狀此陰虛火動之象與加減八味丸至六十丸精神覺爽頃之又下八九十丸睡至天明病去十七方信立齋師加減八味丸治水涸之症即令朝暮服此丸復合參苓白朮散漸愈覺小便痛想動色事故耳服以逍遙散門冬五味子而平此病動色而不死必體實而邪氣仍非深重者前敘證似未協細審尺脈收縮當是血去痰生痰伏下焦尺脈洪射當是下陽乍復與痰相激也王春元二令郎年甫七歲久患赤痢消導削積之劑已服過多後轉下白如涕渾無糞診之浮中沉六脈俱虛無神三五不調外症手足俱冷且硬面浮齒白懶語此陽氣虛寒之症宜溫補脾胃以生肺金用補中益氣加炮薑官桂各二分其間人參止用三分且陳腐不堪服四劑手足略軟言語亦健第未溫耳其下白仍不減亦虛寒滑脫危症宜補宜澀宜溫復用前藥加好參五分大附二分半御米殼一分服一劑則足已溫大便即有糞白退十八自茲手足俱溫軟泄自全止還服前方去御米殼附子二味予歸囑以如身中已溫暖薑桂亦去後服參苓白朮散以培中氣使來歲乙巳厥陰風木之氣不能制飲食尤宜慎之予友薛理還僕遠行忍飢又相毆脫力時五月初遂發熱譫語以補中益氣及五苓數劑不效延予診之六脈俱無乍有則甚細其外症則面赤譫語口碎一友曰陽症見陰脈證在死例予曰當以陽虛從脈舍症治之遂下附子理中湯冷服二帖脈稍見四帖則脈有神而口碎愈矣六帖則脈如常但譫語未已予曰脈氣已完復而譫語不休者胃有燥糞宜以膽導導之果下燥結譫語遂平此證若大便滑易者有瘀血也以桃仁下墨糞馬見源精神素弱且勞甚餓時吃冷肉一塊遂不快發熱譫語作狂乃飲食勞倦之症鄉醫先汗一次不退又下三四次便倦怠昏沉不思飲食吐痰晝夜不寢素無痰而忽吐痰者肺胃筋膜內傷也多由飲食勞倦宜堅筋以復其力痰發於筋膜者也筋膜傷而濕困之則痰常多筋膜傷而火激之則痰暴湧凡治痰欲除根本者在補血養筋而堅之筋力堅強自液不外泄下多亡陰中氣大虛之故迎予診六脈俱有四至洪緩無力缺至半夜反加吐痰不已起復診之六脈俱細此邪氣已去真陰欲還陽虛反發躁之象急用六君加薑桂各三分服即成寢至明午方喚醒之又一劑欲睡不醒精神反覺懶怠邪氣盡退而正氣將復矣至下午吃米湯一盅口知穀味再用補中加乾薑桂門冬五味而瘳脾胃例孝廉王於鎜父年六十餘六脈俱弦牢右三關浮中沉甚豁大左三略差外症晚則作飽且大便不利此土受木製脾胃不輸津液中氣虧損之候也宜補脾胃生肺金乃用補中益氣湯加官桂以削木之剋制炮乾薑以溫脾胃撤沉寒山藥山萸佐當歸以養陰麥冬五味驟收肺金以生新水服二劑覺胸中稍寬身中反有眩意此正氣欲復而邪漸退故瞑眩耳又服數劑復診之則牢堅已去第二尺俱洪此真陰真陽並虛當平補之用八珍晚服六味丸大腸漸潤再數劑全愈邱生年十八歲正月間過食曲餅湯麵遂不快發熱頭痛邀予診之脈略緊中沉洪滑曰當先除去風寒以九味羌活湯一帖寒熱頭痛悉失但覺不快耳予適他去彼延別醫用柴平湯一帖病不減晚歸診之脈洪汗出而腹痛甚不可按以元明粉泡湯下導滯丸二錢其痛減半尚有脹再用前丸一劑而飽脹如脫但腹痛耳復增瘧狀諸症皆胃中有死血也何不重加桃仁於劑中予又診之六脈俱細弦此脾土受木乘又被伐之過宜用溫補以理中湯二劑肚痛除又以過食復飽診之弦細如前仍以前湯但溫脾胃而食自消諸症去湯如玉母懷七月而生後每大便甚艱須二三時方安百治不效予謂肺腸氣血不能吹送欲來不來乃脾虛也脾主信欲來不來無信也當補脾肺使各施其令而吹噓之氣自如調理數月而愈每見雞雛初生當肛門內猶一片色如卵黃是人物之生以腸胃為最後七月而生腸力未全必有補血堅筋強力固腸之法隨時進退與之終身一婦年五旬二寸浮洪二尺小右關弦不思食頭眩余曰二寸浮洪病主頭眩亦主上膈不清此陽氣虛而越上不能歸根復元以致丹田氣虛寒不能養溫脾胃是以右關脈弦飲食不消而少飧也理宜斂陽氣歸於下焦丹田之內下焦溫暖脾胃自健水穀自化矣用桂枝白芍六分五味子二分白茯一錢黑姜三分人參五分杜仲一錢破故紙五分炙草四分湯泡半夏一錢加煨姜十餘劑而愈蔣懷劬年六十素吐白沫已數十年矣忽喉中有噎意以白予曰此脾胃虛寒也宜用人參調補中氣彼辭以貧窶自將白糖齏汁熬化含吐及六七日則溏泄日五六次神亦勞倦食亦不貪延視之六脈皆二至來三五至則止如雀啄之狀此元氣大虛不能噓吸周迴耳用六君子加肉桂四分吳萸二分乾薑二分二劑則脈連續而不止又二劑反加浮洪粗大數七八至發熱口碎舌碎乃虛陽上越之證予思之脈已犯難治之例且吐沫不止腎水泛脾虛失統也用缺病亦稍退稍勞即復服數劑復減再勞又如故至兩三月後藥亦不受亦不效五六日而歿先賢云粗大之脈難治書此以證之虛勞例曹桐江令堂年六十外九月間發熱少飧余診之六脈俱無神有八至右關浮則滿沉則無正經云脾虛浮似肺亦火內郁之症脾弱宜矣用補中益氣數劑變瘧此正氣復而邪氣欲出矣用六君加五味乾薑四帖痊復合參苓白朮丸調理康健如故三月間予六弟年九歲先於二月十八日病痧疹退發熱不已不飧飲食惟飲冷水啜數口少頃即出延之三月來報余思之曰不思食脾胃虛也欲飲水熱也飲少頃即吐中虛假熱也且兼吐酸水此木旺土衰之病以六君加姜炒山梔服二劑熱住少頃復熱此中氣虛極得藥力則退藥衰復熱此藥力少而病氣重也往診之脾胃脈弦無神五六至不定見遲左三洪漫看指上三關俱透命關脈已黑喘氣晝夜不休遍身發熱六日十日余不更衣矣遂膽導一次出糞不黑不硬而帶溏非真元之熱乃脾胃氣虛不能升降耳小便赤澀欲便則叫呼痛楚之極乃陽氣餒而下陷升降失司氣化失職所致用補中合六味湯三帖加麥冬五味子喘氣即止熱亦退惟小便澀痛不已仍用補中益氣加麥冬五味子牛膝車前乾薑炒黑清肺生水升陽益胃暖中一劑小便出血並血塊若干乃邪火煎熬陰血乾枯而成也又二劑痛止飲食頓增全愈矣予曰用前劑而獲如此之效豈非補脾養肺金盛水生氣化自出之謂乎了吾先師云無非清氣下陷不升不降此翁諄諄言之治百病無不驗識此以語後昆此肺熱氣陷蓄血於膀胱之分也脈證宜細看曹悟岡令愛年十七歲七月間以勞倦發熱不思飲食六脈俱洪用逍遙散四劑遂愈自後飲食不甚貪肌肉不生此脾胃虛也還宜服補中之劑彼視為泛常不及調養延至十一月間忽氣喘咳嗽此土不能生金也且發寒熱復診之六脈無倫次無至數偶來一如遊絲亦無定跡外症喘急吐痰不食麵紅遍身冰冷兩目有時而左紅赤有時而右紅赤此脾胃久虛真陰漸亡虛陽上越之危證以六君加薑桂各三分門冬五味黃耆二帖嗽為稍緩四帖而寒熱止飲食增又診之右三脈尚弦細用補中加薑桂晚煎八味丸一錢五分十餘劑而痊至來年正月間復病如前蓋因節下飲食過傷亦緣前之元氣未復脾胃未充故耳其症比前更重脈亦如前日夜不睡以歸脾湯加大附三片薑桂各二分服一劑即齁睡一晚又三劑更服補中加薑桂山藥故紙二十餘劑復診之右三比前覺定但弦不和仍服前湯用八味丸四十餘粒同煎服之又二十餘劑身溫症退而平與劉夫人馬見源案參看錢心卓令愛五歲先於十二月間患肛門腫痛且碎且瘡不思飲食以翰示予曰此脾胃虛弱虛陽內郁不伸下溜侵肺金受克之故宜六君加升柴吳萸制黃連炒黑色三分二劑即瘳第未全復延至正月盡發熱不思食眼札淚出而紅泄瀉服他醫煮肝治疳之藥不效復語予亦以四味肥兒之品與之初覺有效數日反益重此元氣已虛攻伐太過也遂乘舟來就診之則右關弦細左關洪漫發熱日夜更甚晚間瀉十數次咳嗽予嘗觀脾胃不足及久病之人未有不左脈大過於右者正東垣左脈克右脈之說理勢使然況脾土一虛肺金益衰水涸木枯枯木生火焉得左脈不大於右用前劑加薑桂門冬五葉送下四神丸六七帖暫進暫退脈細如故此元氣未充不宜改方彼亦深信又服四劑眼札略疏矣此真元漸有複意適了吾師至云所用之方止減陳皮泄氣不能堪也又去陳皮十餘劑病減十八再數劑全愈張敬山夫人年四十外病已八月多矣遍身肉盡脫氣喘不思食延予視之六脈俱和緩有神四至雖名有胃氣經曰形肉盡脫者不治脈不應病者死姑用六君加門冬五味乾薑二劑初覺不安頃之遂齁睡氣喘亦疏聲亦響亮復診之六脈俱細脾肺二脈似來似去欲脫之象此的為死候矣再三諦詢彼云稍可但不思食耳予思此脈比前反退甚是不宜又勉進前劑一帖又瀉增胸膈飽悶且不納水湯此中氣已虛不能輸運遂查歷日乃乙巳曰今晚死矣重於甲卒於乙此五行之定製也已而果然友人薛理還云久病脈有神服藥頓退此決死之病正如燈火之將滅又愈明而遽絕耳王姓女六歲痘後患咳嗽將三月不思食迎予視之六脈弦細此脾肺虛寒也此痘後熱血蓄於肺絡也若外襲風寒內伏寒濕必兼喘急六君加薑桂門冬五味四劑飲食頓進嗽亦稍止此真元未散藥力易得再十餘劑去十九然脈尚弦細較前不過略和教以服前劑不允而止明年復患如左脈亦仍前以煎劑治之全愈第脈終末和緩猶帶弦細也予曰病雖瘳脈氣未復脈久不和其本在血絡和血即脈復又明年三月重患如前又視之如故以十全大補湯門冬五味四服而愈予思之猶未脫也當補中大補劑百餘方獲五臟堅牢而宿疾亦不再起矣不然年盛時色念一動將有不勝其喘患矣世醫以咳嗽之疾全作痰火盡治以清痰降火順氣克伐之劑遂至脾土中損多致不救不知咳嗽之疾由脾胃不和肺金失養金不生水心肝二火陡起於內乘所不勝遂咳嗽不止而肺病奄奄脾胃益虛此子病母憂化氣使然也正宜補脾胃生肺金不拘劑數使脾肺得養五行暗化土盛金生而咳嗽自休矣丹徒王盛之年三十餘六脈俱九至外症則咳嗽面赤懶言怕鬧時病已半年從前苦寒之劑不記數矣如此即胃絡當有死血在此真氣已虛而脈數也經云數則元氣虛數則脾氣虛又云數則有熱而屬虛是皆不足之症六脈中又脾腎二脈洪大此肺金不能生腎水也理宜補肺金生腎水水旺則制火金旺則生水平木木平則脾土盛又生金矣此正治也乃與云茲證取藥十四五帖或二十帖外當有汗出此陽氣升而經絡通矣汗後即當倦八九日或半月此邪退而正虛也或十日半月元氣漸復倦態方去自後溫補脾胃之劑又當痰動血動或發腫毒或作瀉此數者聽其自來乃臟腑邪氣欲出發動流行之象也倘不預言恐變症多端患者驚駭耳因與以補脾生肺滋腎水之劑五六帖數脈不減此真元虛而燥也即以前劑去頭煎服二煎三煎不十劑而數脈去此時虛火一退中氣便寒以六君子加薑桂五六帖脾氣運動痰飲便行歸於腰脊肝腎部分大痛邪之所湊其氣必虛益見肝腎虛矣是胃脘死血下溜未得出路也令外以鹽熨內服二陳加桃仁元胡索薏苡仁二帖大腸見痰血而痛止血為熱為痛痰為冷為喘此病久服苦寒仍能見血而愈是體氣壯實也復用補脾六君加五味白芍而愈倘不預明此理則變出腰脊痛時便沒主張矣此案脈證宜細看一婦年五十小便時嘗有雪白寒冰一塊塞其陰戶欲小便須以手摳溺否則難予曰此胃家寒濕緣脾氣氣寒凝結而下墜至陰戶口而不即出者脾胃之氣尚未虛脫但陷下耳用六君加薑桂不念劑而愈一婦素勞症四月間胸中作飽腹亦脹不飢日夜瀉十數次診之肝腎脈弦而不和此肝腎虛寒也治以破故紙一錢杜仲一錢五分山萸三分熟地三分吳茱萸三分甘草二分烏藥三分沉香磨三分四帖稍有轉頭八帖能進湯水二十帖全愈豐義儲中和持齋十七年矣先九月患夢泄已而發驚此五臟空虛津液燥涸肝木生風風火扇搖故令精動而泄也攻補皆不效先潤養其脾胃脾胃潤使津夜四布百骸通澤一月再診之肺脈大土不能生金也左尺細長金不能生水也余俱洪緩且不甚流利洪緩不流利津虛血燥浮無根幸不在尺部左尺細長是夢泄發驚之本脈以下焦寒氣上擎也以補肺之劑四劑則和而長矣虛則補其母之法也先時不知飢以異功散加黃耆桂芍五味子補脾生肺肺復生腎三臟相生晚臥不寧以歸脾湯間服之元氣漸充精神漸發越半月餘加用太素丸全愈庚午正月診得用吾先生左三脈沉枯細小澀此勞傷筋骨氣也右三脈浮而洪數左右皆八九至此飲食勞倦傷脾脈也其症神思昏倦發熱先因飲食不消曾服消導之劑以致如此思之曰脈雖數年雖高症雖重而長緩尚可延生遂用保元加桂芍五味子黑姜三分服數劑浮洪脈斂數脈亦退第不知飢耳此脾胃不開也且服此劑而無汗必氣未全旺遍身經絡尚未通故耳恐此後必發毒因五臟之邪未透毒必內攻一經而出況此平素郁勞甚毒必從虛臟而出未幾果少陽經發一毒痛甚其堅如鐵灸之念艾遂浮腫而散傍復生一腫再灸念艾而痛止耳前後板甚此血雖行而滯未盡散經絡未盡通再以保元輔脾活血通經之劑與之適左半身發汗甚黏左屬陽此陽氣發動也明日覺身中不安而躁此作汗之兆果下午遍身有汗且作瀉此中氣虛寒也作瀉有蓄痰宿水因氣化而下出者不盡由虛寒當詳察所瀉形色以中和散人參湯調服遂稍飢肚痛亦退矣明日再診六脈俱六至二尺弦此下焦虛寒丹田氣冷命門火虛不能生脾土也虛則補其母不思食而作飽當以六君子湯主之加破故紙小茴香溫下焦以生火火以生土之義加黑姜以溫中以稍食加健運加桂芍五味以斂肺金生水水升火降也自此以後脾氣漸健飲食漸進而腫處滯血方化為膿大抵脾胃之疾兼之高年又值春木正旺之時過此一關無肚飽之症可保萬全矣肚飽為太陰內陷胸痹為陽明下陷任脈上虛皆由血死下澄不復溫化凡高年及虛人久病無端忽見肚飽胸痹體倦食減即不起脈反緩長如無病也頭痛例一老婦患頭痛二月諸治罔效余治以通經絡和氣血之劑十餘帖晚上吐血二碗許其家惶恐奔告余謂其症明日當愈已而果然一貴介年三旬先因齒痛用石膏三錢煎服頃即滿頭皆腫痛牙根上齶腫勢尤甚俟天明稍退蓋得陽氣故也診之右關細洪左關澀左尺亦澀余謂須納氣下達方得脈和定方各羌活散火湯羌活酒炒五分防風三分酒連一分酒芩二分白茯苓一錢人參二錢甘草五分半夏一錢破故紙一錢枸杞子一錢二劑其細澀脈即粗大是陽氣下行矣頭痛稍止可見前頭痛是下焦無陽陰火上衝服之八劑頭痛全止齒根腫猶未退脈則益和余曰將愈矣此陽氣已至羌所果四五日出膿少許而瘳胃脘痛例萬曆壬寅六月間家君年五十三矣患心口痛嘔食麵黃診之脈細弦數六至余即灸氣海乳根各數壯服補中益氣湯加吳萸姜炒黃連山梔二三十帖又以四君加減丸補脾遂愈明年天旱家貧車戽力罷復吐酸如前再服前劑及八味丸而安一婦人年五十餘素有心疼久已疏矣七月間舊病忽作醫以寬中導氣削堅攻血等劑致中氣愈虛不思飲食神憊迎予治之已五六日不食診之六脈俱沉惟脾胃弦細似有神尋亦難得外證則心口痛左脅脹硬嘔苦酸水但能飲清湯如吃米湯一口即飽脹不勝正木來剋土之症也然其人脈病雖篤面色肌肉猶不甚脫憶古人憑證不憑脈之語投以異功散加吳萸乾薑佐以姜炒山梔三分二帖病失十五再二帖而愈眼痛例徽州方奉安令郎十二歲孩時乳母無乳且喜酒恐其父知無乳私以果米食喂之乳哺三年後便眼弦紅爛此受母濕熱故也漸至眼不得開延予治之六脈俱洪予曰此腎水不足之疾當益水以滋肝木以六味湯加柴胡山梔數十帖而愈時方秋候余復言宜多服前劑預培腎水以助來春生髮之氣彼怠緩不果至春遂如予言他醫治以芩連涼心之劑進至五日眼不開且發熱不思食作瀉咳嗽此過傷苦寒收降太過致陽氣受虧胃氣不升發也凡過服苦寒在血實之人胃絡凝痹當見一塊結急而疼痛且愈覺內熱血虛之人胃血辟易胃體寒僵肚中一片全不柔和溏泄作墜而微痛若不速救至舌淡無苔是血絡全閉胃氣不能上榮也此案是濕熱酒毒久伏血肉之中治宜活血解毒使遍身發瘡自瘳苦寒逆折固在所忌甘溫補脾亦非邪盛時所宜能增濕熱助毒氣復請視之六脈俱八九至按至骨則細無神左心肝洪大於右按之無力此氣血大虛元氣大憊之症幸童子真元未散尚可救藥亦須服藥半年方可見效治以四君加黃耆山藥門冬五味三月發熱咳嗽稍可作瀉猶未止教以服補劑參苓白朮丸間以前藥至半年脈退六七眼亦開矣第赤爛上下黏膩未除或時可或時黏此正氣未全復邪火未全退也還當扶元氣而邪火自息彼吝於參費復用別醫以補血當歸生地之類一兩月前症復作眼復赤爛不開反增惡寒發熱作瀉咳嗽如舊事已告急復求予診六脈俱細數比前更甚余許以八帖之後惡寒不減便不可回服保元加白朮門冬五味四劑後惡寒頓退惟發熱不已余曰蓋惡寒者陽氣虛也服四劑而祛之陽尚強尚可救療後以保元四君加山藥門冬出入服之至冬眼弦赤爛已去數脈俱退止五六至按之無力眼中不時兩眥有紅胬入睛此陽虛上越之故也以補中湯去升麻入熟附一二分七八劑胬退數脈亦退仍眼前劑而全愈左光祿丞年及四十兩目俱瘀肉滿珠他醫與以祛風散熱之劑不效余謂脾主肌肉此脾胃肉滯也以桃仁泥二錢枳實一錢半連翹一錢半元明粉二分白芷二分山楂肉一錢半晚上日服一帖至十帖而全愈余以此方治數百人患此者俱未嘗不效第先曾服多苦寒之劑已傷脾胃不思飲食者禁不可與如勉用之則眼必壞且致虛損如患此症服過寒涼已傷中氣且宜靜養守之亦得漸退不可造次至於失明蓋此症醫者罕識陽明多血多氣之經而經云血實宜決之此方決之之意也如患者脾胃素虛必欲服之或間日一帖或間二日一帖可也急服則損目傷脾也此方從桃仁承氣套出而丁寧告戒者過服寒涼胃血辟易再用苦鹹寒泄即血不復能上榮邱豫章患瘀胬滿眼醫以大黃行之祛風散熱之劑服之俱不退以前方三四劑而愈一女人年五十餘素眼疾因服祛風散熱之劑忽口乾且發熱多眵開合不得紅筋薄翳滿目六脈洪數五六至浮沉俱無力此氣有餘而血不足症也四物加黑柏二分山梔陳皮八帖而愈劉夫人年五十餘忽眼疾醫以祛風散熱養血之劑治之不效已五六日矣眼珠痛聲撼鄰予診之左關洪喘且大此肝血不足肝自生風也細觀之左瞳神散大痛不可忍無紅筋加味逍遙一帖服之痛止一二時復作此藥力盡也日服二劑將六七帖痛減十六十二三帖全愈後教以服六味地黃以生肝木楊宅使女年八歲兩目眵淚不幹眼眶赤爛此脾胃濕熱以胃苓加酒炒黃芩連翹六七帖而愈一朱友年三十外患左目自上而下紅瘀兼翳俗曰垂簾其勢自上而下象垂簾之狀故云用加味逍遙去白朮加川芎少白芍十數帖去其十六再十帖而全愈復令服地黃丸一唐友年二十外症亦如前亦用逍遙加減如上服十五六帖而愈齒痛例家慈年五十三歲齒痛不食已幾月矣人誤以舊方野蜂窠填入鹽椒羊脛骨為末擦之滿口皆碎倍痛愈不能食而母以人中白塗疳散抹之方可進湯水遂乘舟入城診之右三脈俱伏左寸關細左尺洪緩怵曰揀方醫病不如以理思之右三部伏因齒痛不便食脾胃失養故也左寸關細者緣脾胃虛不能榮養心肝之血而然左尺洪緩乃濕熱耳用白朮甘草陳皮補脾胃四物湯以養陰血蒼朮茯苓黃柏知母以除尺之洪緩胃之濕熱四帖而愈崔友年二十外素好色忽患齒病遣使來云病齒齦腫痛且流血不止予思之曰此木剋土之象肝腎血虛風火妄動乘其所不勝也以加味逍遙散二劑治之服一劑痛則減血收二劑全愈蓋涼肝腎之陰治風熱之標培脾土之虛經云木鬱則達之火鬱則發之正此謂也師祖存碧年四十餘素脾胃不充忽一日齒痛兩口角流涎不止灰挹滿鬥楚聲撼鄰脈之右關弦急此脾胃虛寒之症用補中益氣湯加吳茱萸乾薑肉桂各三分內人參五分服之頃間痛未解而反增坐臥不安此藥力未施也再頃之痛雖減而涎猶不止予曰涎乃脾家液不宜過去即煎前湯加人參八分明曰又如上一劑痛止液亦不去再三帖全愈雜症例一女人胎八九月矣忽腰痛甚診之六脈俱細二尺澀且弦予疑之視其懷抱不虛予曰雖是胎恐難產亦恐或墜後遇查育吾先生診亦如予言以養血氣藥與服遂得如期而產一子然不暮而亡觀此女素稟弱勉得胎孕而乏其滋養宜如此之克驗也侄男甫六歲三月間忽然熱三日右面心胃經部分出痘一顆如鵝眼大右眼弦胞皮上一顆不甚發而沒余而細紅筋數條至五六日不貫漿發熱煩躁晝夜不睡肚飽咬牙寒戰抽搐時刻叫喊不安余視之六脈俱八九至幸大便不瀉予思曰肚飽者脾胃弱不能輸運毒氣也煩躁者腎水不足而有火也抽搐咬牙者水不能生木枯木生火風火搖動之象乘其所不勝也大法當先保元氣清肺金生腎水水旺木滋而火自息遂合方名保七六三湯保元湯七分六味湯料三分也加門冬五味一帖鼾睡半日醒而復躁復半日偏身如蚊齧之狀甚細又照前一帖復睡如前醒後煩不安予曰鼾睡得藥暫元氣少復邪氣少退之故復煩者里毒未盡出也復用參耆四聖飲二帖漿足黃如蠟色又七八日方脫靨古人云三日熱三日透三日齊三日漿足三日脫靨此正氣不虛者言也虛而邪盛者不拘於此余曾見咬牙寒戰俱棄之不醫而諸書亦云難治惟立齋先生有治方不拘此神化再出非庸醫可覷其一二者葉少池令郎年十五發熱足不能行且痛予診之六脈俱十至二尺弦細此血虛發熱兼濕有寒用逍遙散加酒柏三分蒼朮一錢三分吳萸三分二帖全愈予不意應效如此之捷近年榮相文忠公患此證即用此方神效但不除根丁會成年四十餘春季右腿正面忽痛麻診之右三部洪數五六至問口渴否曰是也升麻葛根湯二帖而愈壬寅九月間大妹年二十一歲緣家貧憂悶忽患乳癰不信服藥漸至脹長尺許極為可駭予思石山先生微義大都人患瘡癰畏針不早開膿致大傷陽氣後難收復即以神效栝蔞散二劑與服之膿即射出厥後果然瘡口不收汗出如珠至日西則昏憒不省人事予曰雖膿已出陽氣終損第未全脫耳診之脾胃命門脈細弦余浮無沉按無力此陽氣虛也以十全大補及補中益氣出入服之數十劑方愈仍令再服八味丸數斤無後患不則陽氣終難恢復以怠惰不如所言來年十月間前陽虛之症復作流汗如珠拭去復有予曰此少服八味丸之故以補中益氣加吳茱萸破故紙乾薑二三帖即減數十帖而安復教以服前丸妹猶未果又來年七月患傷風狀來告予欲藥予曰此陽虛不衛外之故以補中益氣二帖服之緣中氣寒極不甚應病已十二三日矣復召予視之汗出流水面赤舌出不收嘔惡吐痰吐酸晝夜不知人事下瀉清水滿口皆碎膈中隔塞不通診其脈十至余有影無形浮中沉俱無力脈狀難定明知前症之虛寒尋思東垣此事難知之旨上吐下瀉此中氣不和脾胃虛寒之症也即投理中湯加吳萸薑汁炒山梔一帖上下皆通舌收喘定痰止遂索湯水惟昏憒如故再一帖口瘡盡愈與十全大補湯並服加減八味丸二十劑余兩太陽各生小癤一二枚前數脈盡退方識人自云向晝夜如夢今日方醒九月盡再診之豁大難明之脈已退惟細弦耳尚呃逆吐痰重以六君加吳萸乾薑砂仁煨姜一二劑呃止復以異功散加乾薑吳萸及前二丸而愈邱子明年五十外左乳上發一腫服消毒藥且不戒勞又兼遠行遂腫大如盤高一寸許猶服前消毒劑反增惡寒不思食余視之六脈俱弦微大不和無神此陽氣虛而脾胃亦虛寒之症以棗大艾圓傍逐一灸至中以痛為度積八十壯服六君子湯加黃耆一錢薑桂各五分一劑至晚即睡不覺天明腫遂平嘔惡減半再劑嘔惡去飲食頓增復用八珍湯去地黃加耆桂姜如前腐如瓜瓤此陽氣尚能作腐可醫之兆予適他往瘀死之肉剪遲瘡面連結色黑如墨重發熱攻開一方醫為割之熱透遂涼仍服消毒藥乃泄瀉日數十行嘔惡渴甚肚痛瘡紫黑予歸急用六君加耆薑桂如前煎送四神丸百粒二劑泄瀉止半三劑肚痛泄瀉俱定瘡色變紅但渴不止此真陰虧也用八物去地黃加耆姜送下加減八味丸七十餘粒數十劑而愈此節有訛文一友年二十外左邊睪丸並腰痛醫以大黃等藥與之約六七日矣反發熱痛甚此寒氣著於內著而不行也余診之二尺沉按弱細余俱洪數且有滑意予曰此作痛將欲成膿用真人活命飲加人參五分缺牛蒡子一劑痛減二劑全愈蔣子賢年四十外因長途勞頓兼酒色面若燻黑橘黃帶微黑也無力不思食六脈俱細盜汗噁心作飽用六君加蒼朮一錢肉桂二分乾薑三分六七劑口知味知飢至三十帖面紅活但作瀉未止與以四神丸三四服而愈第覺左邊睪丸有腫意此脾健運濕熱下流之故也不及治之復北行酒色兩兼且受惱怒重發熱不安與補中益氣湯加羌活蔓荊一帖熱稍退而陰子腫大如鵝子大左脈洪用小柴胡湯合四物加車前一帖不減且溺則小便澀痛難出口乾發熱更加龍膽瀉肝湯加牛蒡子七八帖發熱退去口乾亦減溺亦不澀睪丸腫軟十八又服數劑服活命飲加牛蒡人參十數劑腫消王岐岡年十七讀書坐久受寒遂左邊睪丸作痛用真人活命飲加牛蒡人參八帖腫消陸起潛右拗患腫作痛六脈洪數右關尤甚用逍遙散加川芎二帖而愈予曰洪心脈也數者火旺水虧之徵也而右脈盛氣有餘而血不足也肝血不足肝木生火故脈洪數也而右陰抝腫痛者以右脈甚也抝者肝家部分肝木為火所爍則筋急而拘攣腫痛也以前湯清其熱養其血培其根故捷如影響也亦瀉實火耳非養陰培根也劉七官年十七遍身膿窠瘡其色紅紫余視之則蹺足而臥以陷曲處多瘡難於屈伸故耳六脈俱洪大有力數有十至用加味逍遙散四帖而愈越二月手足復患如前六脈俱按洪大以四物加朮陳耆門味八帖而愈伍姓久患漏腫肛口連臀尖流血不止醫以大黃末敷之其肉漸黑硬麻且病目紅筋滿珠開合不便余視之以逍遙加味者添桃仁連翹十餘劑服之而紅筋十退六七而漏亦稍可予復令揭去大黃日灸艾十餘壯候痛即撤之內服托裡消毒散加破故紙以其命門脈弦故也服數十劑此方去取一二味後肉漸軟紅活而愈亦教以服六味地黃丸加故紙杜仲統觀諸案恪守立齋家法理路正大第藥力太薄法少變化不足治大病啟後學在氣血微虛津液不足而經絡未有痼痹者自可收功若夫虛極之重病實極之暴病虛實雜極之奇病諸方安能制之故講方法者必有傷寒金匱之矩矱兼千金外臺之魄力乃能任艱鉅適變化而不竭焉此書格律謹嚴可為老人虛人調養指南首二卷頗有精語極宜潛玩視近世好為張皇幽渺詞蔓理晦者奚啻霄壤
