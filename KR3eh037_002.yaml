body:
  text: 卷二醫勞歷例第二嘗治虛損脈緩五六至但咳嗽發熱無惡寒喉痛喉梗等症以為可治服保元四君之類十餘劑咳嗽略可熱亦微退至二十劑外咳嗽反甚熱又如故而身反不能展側兩足漸無力至不能行而足踡此何也緣下焦腎氣衰憊而百骸間無津液涵溉且陽氣不能四達脾肺之氣不能下輸數語實括盡虛損機關但保元四君八味補中斷難治此大症偶有治愈者必其血分猶未甚虛甚痹也故足無力而蜷雖藥有效病難暫減終不治也嘗治虛損六脈俱數有神和緩雖數至十餘至不妨可治初用四君加黃耆五味子十數劑後數脈漸減仍帶和緩意可治之若退出細如絲尚數決不可治又有退出如絲而不數此猶有胃氣無肚疼作瀉肚疼為血死作瀉為氣脫而飲食如常亦可保元參術調理二三年愈然所云服藥後數脈漸減和緩有神為可治者亦須三月見功年半方全愈又須看年力之衰壯及精神脾胃之強弱也若服藥後脈雖和緩而腿足漸無力如前所述且痰嗽不止脈雖緩治之無益焉然或如前症足雖無力而熱已退嗽減飲食如平人此脾氣尚弱猶可遷延歲月又有如前症六脈俱和緩服前劑熱退而脈漸弦反作瀉下血此平時經絡留血為火熱煎熬而成者也此涼藥遏血伏陽灼而敗之即仲景平脈篇熱氣所過血為癰膿義下半月或十日五日自愈下血時能飲食不死不能飲食精神倦怠死可立待其用藥健脾保元氣為主腹痛脈弦理中湯噁心飲食少六君子湯無此二症用四君保元治之蓋下血者邪氣從下竅而出也又有變作傷風狀者邪氣從上竅而出也宜溫肺助脾之藥亦得半月而愈又有六脈俱和緩數八九至服前劑先右三脈退去二三至左脈尚數不退是右表先退左里未退也至數脈盡退病將痊愈左脈猶比右脈多一至足見表退而里未和耳難知云傷寒以左為表右為里雜病以右為表左為里信然看元氣之存亡在左看元氣之輕重在右百不爽一慎齊師嘗云凡病求汗不出者不治虛損六脈俱數服滋陰降火之品不及四五十劑者猶可治之如服至數十劑及百劑者真元耗盡雖脈大洪緩中已無神因用補劑即退去洪緩變為細數即漸痿困不起而斃矣戴人年少不妄服藥易治正此謂也又或服寒涼未多用保元四君加生薑一二錢一二十劑求汗不出而洪緩之脈不退亦屬難救或雖無汗而洪緩漸減病亦漸去且能飲食則無妨矣如此脈大抵秋冬易治春夏難療也凡虛損三四月脈雖數尚和緩六七至若逢春夏火令津液枯槁腎水正行死絶之鄉肺絶脾燥無有不死者若秋冬火令已退金水正旺脈雖數可治也然使病者骨立喉啞喉痛寒熱脈細數肚疼作瀉亦不治如前症求治初用補劑病當反重何也病已延至三四月服藥已多其不效者必過用寒涼病者五臟愈虛邪火愈熾初用補劑或數帖或一二十帖邪火一退反覺頭眩噁心骨疼腳痠神氣昏懶不思飲食亦有宣肺疏肝健脾滋腎反見火大者初為涼劑遏其真陽下伏接用振陽安陰法即愈以根氣尚穩也倘脈不細數而帶和緩急用保元四君大劑連服之便安寢半日或一日睡覺即精神頓爽再一劑再寢飲食漸增則可治矣倘脈細如絲肚飽昏憒即屬難治凡虛損病久脈雖和緩未可決其必療蓋久病之人元氣虛弱脈氣和緩者假氣也真氣渙散不能鼓動而怠緩也過七八月間服補劑病得漸減此生機也或延至十一月一陽初動陽氣漸升內氣空虛無以助升發之機則變憎寒壯熱久病忽見寒熱如新感者乃生死關頭也得微汗而體輕氣旺為陽氣振或微汗或不汗熱退而體重氣弱為陽氣脫或肢困不能反側或胸痹飲食日減是皆奇經已敗之絶證服補藥十餘帖寒熱漸退猶可延捱調理至二三月不變得生矣否則不治緣春木旺脾肺久病氣衰不能敵時令矣嘗醫新病或痢或雜病初時有邪脈浮數用按脈病藥數劑數脈即退病亦向安再數劑即倦脈反覺浮數此時不可謂尚有邪也蓋邪退而神氣初轉故浮只宜保元湯養元氣浮數之脈得微汗而退此乃陽氣升元神足而邪自退之法也倘不識此仍以祛邪之藥治之精神日損肌肉日消久之變為虛勞矣凡病遇時節則變換不定或又加者蓋遇時節則天地之氣或升或降而人身之氣亦應之病者精氣尚充猶能與時令相應若元氣久虛之人無以助升降之氣上升則頭眩嘔噦下降則足熱身寒反為氣候所牽而身不能為之主矣病隨節氣而動者氣敗也隨月之盈虧而動者血敗也故重病朔望有加即不治本文是專指升降太過更有當升不得升當降不得降身氣與天地參差者其實亦是一般機括脾胃病十分虛死於初春亦有望春而死者八分虛死於孟春五六分虛死仲春及醫之不得其當者雖原無死道而業已醫壞至季春不能挨矣清明前後二三日尤為不爽肺腎病起於春十分虛死於初夏亦有望夏而死者八分虛死於仲夏六分虛死於季夏凡久病服藥後六脈俱和偶一日診之或細加數或虛弱或變怪異常即當細問起居之故或有一晚不睡而變者或因勞碌惱怒或感冒風寒各隨其感而治之治之而脈終不和此為難治一晚不睡或勞傷者則用補中助元傷飲食則用鹽湯探吐後以二陳加減消食之品佐之若房勞者脈雖變而病不變者猶可以平日調補治之倘病與脈俱變調之不和決難救矣秋冬尚可冀幸春夏萬不可為若傷暑者宜少撤帷閉以治暑法治之若冒風寒以溫肺加風藥散之一二劑即和乃可若不轉亦不治大抵易於秋冬而難於春夏亦觀人脾胃元氣而消息之不可輕忽妄許人以易治嘗治一産後婦人素有勞症一年前以八物湯愈然連連綿綿未為全去次年得産正癸亥屬戊癸化火之年天氣炎甚時醫雖用人參仍以山楂能解參毒間之致寒熱作瀉余診之脈數九至尚不短用保元加乾薑熟附一分四劑數脈退減再清晨診之按下浮緩但去著骨指下細弦如絲數脈如故此又以浮緩中有一條為敗脈矣可知前卷一條之說只是脈中之脊非別一條也神理全不同豫曰不可為矣彼懇求不已用桂制白芍五分炙草五分參耆各五分作建中湯之意服至八劑數脈退幾六至又四劑幾五至彼以為愈矣遂止藥此四五六月後脈轉弦細而歿此案有裨前論故附之凡診虛損無不留心生死關頭者然生死在脈死之遲速在證其中頗有難決者以脈言之一則兩寸短弱兩尺軟長起伏如一極似無病而兩旁邊際蕭條與肌肉不相入也二則右寸短弱左關沉陷右尺細長左尺軟長極似有根也三則午前脈和似無病午後硬大似病重而其證無甚增減也以證言之一則體重不能反側或兩肋支滿或起動汗出而神清音朗也二則胸痹似結痰不能出飲食日減而亦有不減也三則忽發寒熱如新感旋即熱退更加體倦氣弱語聲拖曳也至於脈之細數芤散革牢先數後緩先硬忽軟先細忽大證之喑啞噦噫更無不知其逆者欲以此決其死之何日何時終難灼見曾診兩人一壯年冬月寒傷於足以麻黃髮其上氣逆足胕稍動即喘不能飲食正月諸症稍減診之脈久不來來如雀啄僅在皮毛五七啄後即盤旋於皮毛之上而不能去去又如弦之絶從中分斷不能返入兩手並診又彼此相避來去不齊此元氣已斷危在旦夕因飲食步履未改決在立夏竟延夏至何也一老年平氣弱音低忽增胸痹體倦行步乏力飲食日減夜不成眠脈來雀啄參伍不調模糊無力但不盤旋不中斷不兩手相避其歇在已去之後而不能來耳亦無寒熱時方冬月用溫補大劑保腎安肝兼行痰血並於飲食加意調攝脈旋轉正猶慮腎涸木枯及春生髮之令難免摧折乃至次年冬月脈又結代復以法調之至今四年安健此又何也元氣退而藥食進之其勢必有相及者特其機微而難喻耳究竟死期遲速總不外臟氣天時五行互克即不十全不失八九內經曰別於陽者知病處也別於陰者知死生之期陽脈知病陰脈知死陰陽之脈豈可不別乎
